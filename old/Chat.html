<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POP Empower — Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
@keyframes fadeSlideIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
@keyframes typingDot { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-4px)} }
</style>
</head>
<body>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const T = {
  green:'#20dc95', greenDark:'#0bbf7a', greenDeep:'#065f46', greenLight:'#f0fdf8', greenMid:'#d1fae5',
  white:'#ffffff', gray50:'#fafafa', gray100:'#f3f4f6', gray200:'#e5e7eb',
  gray400:'#9ca3af', gray500:'#6b7280', gray700:'#374151', gray900:'#111827',
};

// ── MOCK DATA ─────────────────────────────────────────────────────
const CONVERSATIONS = [
  {
    id: 1, name:'Ana Martínez', initials:'AM', role:'Paciente', online:true, unread:0,
    lastMsg:'Muchas gracias, hasta el miércoles 🙏', lastTime:'10:45',
    messages:[
      { id:1, from:'psych', text:'Hola Ana, ¿cómo te encuentras después de la última sesión?', time:'Lun 10:22', date:'Lunes' },
      { id:2, from:'patient', text:'Hola Elena, la verdad es que bien. Los ejercicios de respiración me han ayudado mucho esta semana.', time:'10:28' },
      { id:3, from:'psych', text:'Me alegra mucho escuchar eso. ¿Hubo algún momento de tensión que hayas podido gestionar con la técnica?', time:'10:31' },
      { id:4, from:'patient', text:'Sí! El miércoles tuve una reunión bastante difícil en el trabajo y lo apliqué. Funcionó muy bien.', time:'10:33' },
      { id:5, from:'psych', text:'Excelente, Ana. Eso es exactamente lo que buscábamos. Te mando el ejercicio de reestructuración cognitiva que comentamos para que lo vayas practicando antes del miércoles.', time:'10:36' },
      { id:6, from:'psych', type:'file', text:'Ejercicio_reestructuracion_cognitiva.pdf', fileSize:'248 KB', time:'10:37' },
      { id:7, from:'patient', text:'Muchas gracias, lo haré esta tarde. Hasta el miércoles 🙏', time:'10:45' },
    ]
  },
  {
    id: 2, name:'Javier Morales', initials:'JM', role:'Paciente', online:false, unread:3,
    lastMsg:'¿Podemos adelantar la sesión del viernes?', lastTime:'08:50',
    messages:[
      { id:1, from:'patient', text:'Buenos días Elena, ¿cómo estás?', time:'08:48', date:'Hoy' },
      { id:2, from:'patient', text:'Quería preguntarte si podríamos adelantar la sesión del viernes. Tengo un compromiso familiar.', time:'08:49' },
      { id:3, from:'patient', text:'¿Tienes hueco el jueves a la misma hora?', time:'08:50' },
    ]
  },
  {
    id: 3, name:'Laura Sánchez', initials:'LS', role:'Paciente', online:true, unread:1,
    lastMsg:'Muchas gracias por los ejercicios 🙏', lastTime:'Ayer',
    messages:[
      { id:1, from:'psych', text:'Hola Laura, te dejo el material que acordamos en la sesión de ayer.', time:'Ayer 18:30', date:'Ayer' },
      { id:2, from:'psych', type:'file', text:'Registro_emocional_semanal.pdf', fileSize:'124 KB', time:'18:31' },
      { id:3, from:'patient', text:'Muchas gracias por los ejercicios 🙏', time:'20:15' },
    ]
  },
  {
    id: 4, name:'Carlos Ruiz', initials:'CR', role:'Paciente', online:false, unread:0,
    lastMsg:'Hasta el miércoles', lastTime:'Lun',
    messages:[
      { id:1, from:'psych', text:'Hola Carlos, confirmada la sesión del miércoles a las 10:00 h.', time:'Lun 09:00', date:'Lunes' },
      { id:2, from:'patient', text:'Perfecto, hasta el miércoles', time:'09:45' },
    ]
  },
];

// ── AVATAR ─────────────────────────────────────────────────────────
const Av = ({ initials, size=36, green=false, online=false }) => (
  <div style={{ position:'relative', flexShrink:0 }}>
    <div style={{ width:size, height:size, borderRadius:'50%', background: green ? T.green : T.gray200, display:'flex', alignItems:'center', justifyContent:'center', fontSize:size*0.33, fontWeight:700, color: green ? T.greenDeep : T.gray600 }}>{initials}</div>
    {online && <div style={{ position:'absolute', bottom:1, right:1, width:size*0.28, height:size*0.28, borderRadius:'50%', background:T.green, border:'2px solid white' }}/>}
  </div>
);

// ── TYPING INDICATOR ───────────────────────────────────────────────
const TypingIndicator = () => (
  <div style={{ display:'flex', alignItems:'center', gap:8, padding:'8px 0' }}>
    <div style={{ display:'flex', gap:3, background:T.gray100, borderRadius:'12px 12px 12px 2px', padding:'10px 14px' }}>
      {[0,0.2,0.4].map((d,i) => (
        <div key={i} style={{ width:5, height:5, borderRadius:'50%', background:T.gray400, animation:`typingDot 1s ${d}s infinite` }}/>
      ))}
    </div>
  </div>
);

// ── FILE MESSAGE ───────────────────────────────────────────────────
const FileMsg = ({ text, fileSize, mine }) => (
  <div style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 14px', borderRadius: mine ? '12px 12px 2px 12px' : '12px 12px 12px 2px', background: mine ? T.greenLight : T.gray100, border:`1px solid ${mine ? T.greenMid : T.gray200}`, maxWidth:240, cursor:'pointer' }}>
    <div style={{ width:36, height:36, borderRadius:8, background: mine ? T.greenMid : T.gray200, display:'flex', alignItems:'center', justifyContent:'center', fontSize:16, flexShrink:0 }}>📄</div>
    <div>
      <div style={{ fontSize:12, fontWeight:600, color:T.gray900, marginBottom:2 }}>{text}</div>
      <div style={{ fontSize:10, color:T.gray500 }}>{fileSize} · Toca para abrir</div>
    </div>
  </div>
);

// ── MAIN ──────────────────────────────────────────────────────────
function App() {
  const [activeId, setActiveId] = useState(1);
  const [convs, setConvs] = useState(CONVERSATIONS);
  const [input, setInput] = useState('');
  const [isPsych, setIsPsych] = useState(true);
  const [showTyping, setShowTyping] = useState(false);
  const [search, setSearch] = useState('');
  const chatRef = useRef(null);

  const active = convs.find(c => c.id === activeId);

  // Auto-scroll
  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [activeId, active?.messages?.length, showTyping]);

  // Simulate reply
  const simulateReply = (convId) => {
    setShowTyping(true);
    setTimeout(() => {
      setShowTyping(false);
      const replies = [
        'Entendido, lo tendré en cuenta.',
        'Gracias por compartirlo conmigo.',
        'Perfecto, nos vemos entonces 😊',
        'Claro, sin problema.',
      ];
      const text = replies[Math.floor(Math.random() * replies.length)];
      setConvs(cs => cs.map(c => c.id===convId ? {
        ...c,
        messages: [...c.messages, { id: Date.now(), from: isPsych ? 'patient' : 'psych', text, time: new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}) }],
        lastMsg: text, lastTime: 'Ahora', unread:0
      } : c));
    }, 1500);
  };

  const sendMsg = () => {
    if (!input.trim()) return;
    const text = input.trim();
    setInput('');
    setConvs(cs => cs.map(c => c.id===activeId ? {
      ...c,
      messages:[...c.messages, { id: Date.now(), from: isPsych ? 'psych' : 'patient', text, time: new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}) }],
      lastMsg: text, lastTime:'Ahora', unread:0
    } : c));
    setTimeout(() => simulateReply(activeId), 800);
  };

  const openConv = (id) => {
    setActiveId(id);
    setConvs(cs => cs.map(c => c.id===id ? {...c, unread:0} : c));
  };

  const filtered = convs.filter(c => c.name.toLowerCase().includes(search.toLowerCase()));
  const totalUnread = convs.reduce((a,c) => a + c.unread, 0);

  return (
    <div style={{ display:'flex', height:'100vh', fontFamily:"'Plus Jakarta Sans',sans-serif", fontSize:13, overflow:'hidden' }}>

      {/* SIDEBAR */}
      <div style={{ width:220, background:T.white, borderRight:`1px solid ${T.gray200}`, display:'flex', flexDirection:'column', padding:'18px 12px', flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:8, padding:'4px 8px', marginBottom:28 }}>
          <div style={{ width:28, height:28, background:T.green, borderRadius:6, display:'flex', alignItems:'center', justifyContent:'center' }}>
            <span style={{ color:'white', fontWeight:800, fontSize:11 }}>P</span>
          </div>
          <span style={{ fontWeight:700, fontSize:14, color:T.gray900 }}>POP Empower</span>
        </div>
        {[
          { id:'inicio', icon:'⌂', label:'Inicio' },
          { id:'agenda', icon:'◷', label:'Agenda' },
          { id:'pacientes', icon:'👤', label:'Pacientes' },
          { id:'mensajes', icon:'✉', label:'Mensajes', badge: totalUnread || null },
          { id:'notas', icon:'📋', label:'Notas' },
        ].map(n => (
          <button key={n.id} style={{ display:'flex', alignItems:'center', gap:10, padding:'8px 10px', borderRadius:7, border:'none', cursor:'pointer', textAlign:'left', background: n.id==='mensajes' ? T.greenLight : 'transparent', color: n.id==='mensajes' ? T.greenDeep : T.gray500, fontWeight: n.id==='mensajes' ? 600 : 400, fontSize:13, fontFamily:'inherit', marginBottom:2, position:'relative' }}>
            <span style={{ fontSize:14, width:18, textAlign:'center' }}>{n.icon}</span>
            {n.label}
            {n.badge > 0 && <span style={{ marginLeft:'auto', background:T.green, color:T.greenDeep, borderRadius:10, padding:'1px 6px', fontSize:11, fontWeight:700 }}>{n.badge}</span>}
            {n.id==='mensajes' && <div style={{ position:'absolute', right:0, top:'50%', transform:'translateY(-50%)', width:3, height:20, background:T.green, borderRadius:2 }}/>}
          </button>
        ))}
        <div style={{ marginTop:'auto', borderTop:`1px solid ${T.gray200}`, paddingTop:12, display:'flex', alignItems:'center', gap:9 }}>
          <Av initials={isPsych?'EG':'AM'} size={32} green online/>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontWeight:600, fontSize:12, color:T.gray900 }}>{isPsych?'Elena García':'Ana Martínez'}</div>
            <div style={{ fontSize:11, color:T.gray400 }}>{isPsych?'Psicóloga':'Paciente'}</div>
          </div>
          <button onClick={() => setIsPsych(p=>!p)} title="Cambiar vista" style={{ background:T.gray100, border:'none', borderRadius:6, width:24, height:24, cursor:'pointer', fontSize:11, color:T.gray500 }}>⇄</button>
        </div>
      </div>

      {/* CONVERSATION LIST */}
      <div style={{ width:280, background:T.gray50, borderRight:`1px solid ${T.gray200}`, display:'flex', flexDirection:'column', flexShrink:0 }}>
        <div style={{ padding:'16px 14px 12px', borderBottom:`1px solid ${T.gray200}` }}>
          <div style={{ fontWeight:700, fontSize:15, color:T.gray900, marginBottom:10 }}>Mensajes</div>
          <div style={{ position:'relative' }}>
            <span style={{ position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', color:T.gray400, fontSize:13 }}>⌕</span>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Buscar conversación..." style={{ width:'100%', padding:'8px 10px 8px 28px', borderRadius:8, border:`1px solid ${T.gray200}`, background:T.white, fontSize:12, fontFamily:'inherit', outline:'none', color:T.gray900 }}/>
          </div>
        </div>
        <div style={{ flex:1, overflow:'auto' }}>
          {filtered.map(c => (
            <div key={c.id} onClick={() => openConv(c.id)} style={{ display:'flex', gap:10, padding:'12px 14px', cursor:'pointer', background: c.id===activeId ? T.white : 'transparent', borderLeft: c.id===activeId ? `3px solid ${T.green}` : '3px solid transparent', borderBottom:`1px solid ${T.gray200}` }}
              onMouseEnter={e => { if(c.id!==activeId) e.currentTarget.style.background=T.gray100; }}
              onMouseLeave={e => { if(c.id!==activeId) e.currentTarget.style.background='transparent'; }}>
              <Av initials={c.initials} size={40} green={c.id===activeId} online={c.online}/>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:3 }}>
                  <span style={{ fontWeight: c.unread > 0 ? 700 : 600, fontSize:13, color:T.gray900 }}>{c.name}</span>
                  <span style={{ fontSize:10, color:T.gray400 }}>{c.lastTime}</span>
                </div>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                  <span style={{ fontSize:12, color:T.gray500, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', maxWidth:160 }}>{c.lastMsg}</span>
                  {c.unread > 0 && <span style={{ background:T.green, color:T.greenDeep, borderRadius:10, padding:'1px 6px', fontSize:10, fontWeight:700, flexShrink:0 }}>{c.unread}</span>}
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* CHAT AREA */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', background:T.white, overflow:'hidden' }}>
        {/* Chat header */}
        <div style={{ height:56, borderBottom:`1px solid ${T.gray200}`, display:'flex', alignItems:'center', padding:'0 20px', gap:12, flexShrink:0 }}>
          <Av initials={active.initials} size={36} green online={active.online}/>
          <div style={{ flex:1 }}>
            <div style={{ fontWeight:700, fontSize:14, color:T.gray900 }}>{active.name}</div>
            <div style={{ fontSize:11, color: active.online ? T.green : T.gray400, fontWeight: active.online ? 600 : 400 }}>
              {active.online ? '● En línea' : 'Última conexión: ayer'}
            </div>
          </div>
          <div style={{ display:'flex', gap:6 }}>
            <button style={{ background:T.green, color:T.greenDeep, border:'none', borderRadius:7, padding:'7px 14px', fontWeight:700, fontSize:12, cursor:'pointer', fontFamily:'inherit' }}>
              📞 Llamar
            </button>
            <button style={{ background:T.gray100, color:T.gray600, border:'none', borderRadius:7, padding:'7px 10px', fontSize:14, cursor:'pointer' }}>⋯</button>
          </div>
        </div>

        {/* Messages */}
        <div ref={chatRef} style={{ flex:1, overflow:'auto', padding:'20px 24px', display:'flex', flexDirection:'column', gap:4 }}>
          {active.messages.map((m, i) => {
            const mine = (isPsych && m.from==='psych') || (!isPsych && m.from==='patient');
            const showDate = m.date;
            const showAvatar = !mine && (i===0 || active.messages[i-1].from !== m.from);
            return (
              <React.Fragment key={m.id}>
                {showDate && (
                  <div style={{ textAlign:'center', margin:'12px 0 4px' }}>
                    <span style={{ fontSize:11, color:T.gray400, background:T.gray100, borderRadius:10, padding:'3px 10px' }}>{m.date}</span>
                  </div>
                )}
                <div style={{ display:'flex', flexDirection:'column', alignItems: mine ? 'flex-end' : 'flex-start', marginTop: showAvatar ? 10 : 2, animation:'fadeSlideIn .2s ease' }}>
                  {showAvatar && (
                    <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:4 }}>
                      <Av initials={active.initials} size={20} green/>
                      <span style={{ fontSize:11, color:T.gray500, fontWeight:600 }}>{active.name}</span>
                    </div>
                  )}
                  <div style={{ display:'flex', alignItems:'flex-end', gap:6, flexDirection: mine ? 'row-reverse' : 'row' }}>
                    {m.type==='file' ? (
                      <FileMsg text={m.text} fileSize={m.fileSize} mine={mine}/>
                    ) : (
                      <div style={{ maxWidth:440, padding:'9px 14px', borderRadius: mine ? '14px 14px 2px 14px' : '14px 14px 14px 2px', background: mine ? T.greenLight : T.gray100, color:T.gray900, fontSize:13, lineHeight:1.55, border: mine ? `1px solid ${T.greenMid}` : 'none' }}>
                        {m.text}
                      </div>
                    )}
                    <span style={{ fontSize:10, color:T.gray400, whiteSpace:'nowrap', marginBottom:2 }}>{m.time}</span>
                  </div>
                </div>
              </React.Fragment>
            );
          })}
          {showTyping && <TypingIndicator/>}
        </div>

        {/* Input */}
        <div style={{ padding:'12px 20px', borderTop:`1px solid ${T.gray200}`, display:'flex', gap:10, alignItems:'flex-end', flexShrink:0 }}>
          <button style={{ width:34, height:34, borderRadius:8, border:`1px solid ${T.gray200}`, background:T.white, cursor:'pointer', fontSize:15, color:T.gray500, flexShrink:0 }}>📎</button>
          <div style={{ flex:1, position:'relative' }}>
            <textarea value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMsg(); } }} placeholder={`Escribe un mensaje a ${active.name}...`} rows={1} style={{ width:'100%', padding:'9px 14px', borderRadius:10, border:`1.5px solid ${T.gray200}`, fontFamily:'inherit', fontSize:13, resize:'none', outline:'none', color:T.gray900, lineHeight:1.5, maxHeight:100, overflow:'auto' }}/>
          </div>
          <button onClick={sendMsg} disabled={!input.trim()} style={{ width:36, height:36, borderRadius:8, border:'none', background: input.trim() ? T.green : T.gray200, color: input.trim() ? T.greenDeep : T.gray400, cursor: input.trim() ? 'pointer' : 'default', fontSize:16, flexShrink:0, transition:'all .15s', fontWeight:700 }}>→</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<div id="root" style="height:100vh"></div>
</body>
</html>
