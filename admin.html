*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;overflow:hidden;background:#fafafa;font-size:13px;color:#111827}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.fadeUp{animation:fadeUp .22s ease}
button,input,textarea,select{font-family:inherit}
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:232px;background:#0d1f17;display:flex;flex-direction:column;padding:18px 12px;flex-shrink:0}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:52px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0}
#content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.nav-btn{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;border:none;cursor:pointer;text-align:left;font-size:12.5px;width:100%;position:relative;transition:background .12s;color:rgba(255,255,255,.55);background:transparent;font-weight:400}
.nav-btn.active{background:rgba(32,220,149,.15);color:#20dc95;font-weight:600}
.nav-btn:not(.active):hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:#20dc95;color:#065f46;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700}
.nav-section{font-size:9px;font-weight:700;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.08em;padding:14px 10px 4px}
.nav-indicator{position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;background:#20dc95;border-radius:0 2px 2px 0}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px 20px}
.scard{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px 18px}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.btn-green{background:#20dc95;color:#065f46;border:none;border-radius:8px;padding:8px 18px;font-weight:700;font-size:12px;cursor:pointer}
.btn-gray{background:#fafafa;color:#374151;border:1px solid #e5e7eb;border-radius:8px;padding:7px 14px;font-weight:600;font-size:12px;cursor:pointer}
.btn-red{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca;border-radius:8px;padding:7px 14px;font-weight:600;font-size:12px;cursor:pointer}
.btn-outline{background:#fff;color:#065f46;border:1.5px solid #20dc95;border-radius:8px;padding:7px 14px;font-weight:600;font-size:12px;cursor:pointer}
.field-label{display:block;font-size:11px;font-weight:600;color:#374151;margin-bottom:4px}
.field-input{width:100%;padding:8px 11px;border-radius:8px;border:1.5px solid #e5e7eb;font-size:13px;outline:none;color:#111827;background:#fff}
.field-input:focus{border-color:#20dc95}
textarea.field-input{resize:vertical;min-height:80px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(4px)}
.modal-box{background:#fff;border-radius:14px;max-height:90vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.18);animation:fadeUp .2s ease}
.tab-pills{display:flex;gap:4px;background:#f3f4f6;border-radius:8px;padding:3px}
.tab-pill{padding:5px 13px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all .12s}
.tab-pill.active{background:#fff;color:#111827;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.tab-pill:not(.active){background:transparent;color:#6b7280}
.badge{border-radius:999px;padding:2px 8px;font-size:11px;font-weight:600;display:inline-flex;align-items:center}
.badge.green{background:#f0fdf8;color:#065f46;border:1px solid #d1fae5}
.badge.gray{background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb}
.badge.blue{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.badge.amber{background:#fffbeb;color:#92400e;border:1px solid #fde68a}
.badge.red{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
.badge.purple{background:#faf5ff;color:#6b21a8;border:1px solid #e9d5ff}
.trow{display:grid;align-items:center;padding:11px 18px;border-bottom:1px solid #f3f4f6;transition:background .1s}
.trow:hover{background:#fafafa}
.trow:last-child{border-bottom:none}
.thead{display:grid;align-items:center;padding:9px 18px;border-bottom:1px solid #e5e7eb;background:#fafafa}
.pbar{background:#f3f4f6;border-radius:4px;overflow:hidden}
.pbar-fill{height:100%;background:#20dc95;border-radius:4px}
.toggle{width:38px;height:21px;border-radius:11px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;border:none}
.toggle-knob{width:17px;height:17px;border-radius:50%;background:#fff;position:absolute;top:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
#toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:#111827;color:#fff;border-radius:10px;padding:11px 18px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.18);animation:fadeUp .25s ease;pointer-events:auto;max-width:340px;line-height:1.4}

function tabInicio(){
  const totalPacientes     = PATIENTS.length;
  const activePacientes    = PATIENTS.filter(p=>p.status==='activo').length;
  const totalPsicos        = PSYCHOLOGISTS.filter(p=>p.status==='activo').length;
  const sesTotal           = PSYCHOLOGISTS.filter(p=>p.status==='activo').reduce((a,p)=>a+p.sesiones_mes,0);
  const influencers        = PATIENTS.filter(p=>p.tipo==='influencer'&&p.status==='activo').length;
  const totalInfluencers   = PATIENTS.filter(p=>p.tipo==='influencer').length;
  const mrr                = PATIENTS.filter(p=>p.status==='activo').reduce((a,p)=>a+(p.precio||0),0);
  const pendingPsicos      = PSYCHOLOGISTS.filter(p=>p.status==='pendiente');
  const sinPsico           = PATIENTS.filter(p=>p.status==='activo'&&!p.psico);
  const solicitudesCambio  = PATIENTS.filter(p=>p.solicitudCambio);
  const bajasRecientes     = PATIENTS.filter(p=>p.status==='baja');
  const totalAcciones      = sinPsico.length+solicitudesCambio.length+bajasRecientes.length+pendingPsicos.length;

  return `<div style="flex:1;overflow:auto;padding:24px 28px" class="fadeUp">
    <div style="margin-bottom:20px">
      <div style="font-size:22px;font-weight:800;color:#111827">${getGreeting()}, Admin 👋</div>
      <div style="font-size:13px;color:#9ca3af;margin-top:2px">Resumen general — ${new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
    </div>

    <!-- KPIs: 6 métricas -->
    <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px">
      ${[
        {l:'Psicólogas activas', v:totalPsicos,                     s:'en plataforma',                                               a:'#20dc95',icon:'👩‍⚕️'},
        {l:'Pacientes activos',  v:activePacientes,                  s:'de '+totalPacientes+' totales',                               a:'#3b82f6',icon:'🧑'},
        {l:'Sesiones este mes',  v:sesTotal,                         s:'realizadas',                                                  a:'#f59e0b',icon:'📆'},
        {l:'Empresas B2B',       v:EMPRESAS.length,                  s:PROGRAMAS.filter(p=>p.estado==='activo').length+' prog. activos', a:'#8b5cf6',icon:'🏢'},
        {l:'Influencers activos',v:influencers,                      s:'de '+totalInfluencers+' en total',                            a:'#ec4899',icon:'⭐'},
        {l:'Ingresos estimados', v:mrr.toLocaleString('es')+' €',    s:'todos los servicios activos',                                 a:'#10b981',icon:'💰'},
      ].map(s=>`<div class="scard" style="border-top:3px solid ${s.a};padding:14px 16px">
        <div style="font-size:18px;margin-bottom:6px">${s.icon}</div>
        <div style="font-size:20px;font-weight:800;color:#111827">${s.v}</div>
        <div style="font-size:11px;font-weight:600;color:#374151;margin-top:2px">${s.l}</div>
        <div style="font-size:11px;color:#9ca3af">${s.s}</div>
      </div>`).join('')}
    </div>

    <!-- ASIGNACIONES PENDIENTES (Supabase real) -->
    ${(()=>{
      if(!_asig.loaded && !_asig.loading) return '';
      if(_asig.loading) return `<div class="card" style="padding:14px 18px;margin-bottom:20px;color:#9ca3af;font-size:12px">Cargando pacientes pendientes de asignar...</div>`;
      if(!_asig.pending.length) return '';
      return `<div style="margin-bottom:20px">
        <div style="font-weight:700;font-size:13px;color:#111827;margin-bottom:10px">

// ── B2B helpers ────────────────────────────────────────────────────
function estadoBadge(estado){
  const map={en_curso:['blue','En curso'],finalizado:['green','Finalizado'],baja:['red','Baja'],sin_asignar:['amber','Sin asignar'],activo:['green','Activo'],completado:['gray','Completado'],borrador:['amber','Borrador']};
  const [cls,lbl]=map[estado]||['gray',estado];
  return `<span class="badge ${cls}">${lbl}</span>`;
}
function encuestaBadge(val){
  if(val==='completada') return `<span class="badge green">✓ Completada</span>`;
  if(val==='enviada')    return `<span class="badge blue">Enviada</span>`;
  return `<span class="badge gray">Pendiente</span>`;
}
function b2bInitials(p){ return (p.nombre[0]||'')+(p.apellidos[0]||''); }
function b2bPbar(pct,h=5){
  const c=pct===100?'#20dc95':pct>=60?'#3b82f6':'#f59e0b';
  return `<div style="height:${h}px;background:#f3f4f6;border-radius:3px;overflow:hidden"><div style="height:100%;width:${Math.min(pct,100)}%;background:${c};border-radius:3px"></div></div>`;
}
function nextCodigo(programaId){
  const prefix=PROGRAMAS.find(p=>p.id===programaId)?.prefijo_codigo||'COD';
  const existing=PARTICIPANTES.filter(p=>p.programa_id===programaId).map(p=>parseInt(p.codigo.replace(prefix,''))||0);
  const max=existing.length?Math.max(...existing):0;
  return prefix+String(max+1).padStart(3,'0');
}
function _b2bNavigate(id){ b2bSubView=id; b2bSelectedProgramaId=null; b2bSearchText=''; b2bFilterEstado='todos'; b2bFilterPsico=''; rerender(); }
function _b2bNav(){ return `<div style="padding:10px 28px;border-bottom:1px solid #e5e7eb;background:#fff;display:flex;align-items:center;gap:10px;flex-shrink:0">
  <div class="tab-pills">
    <button class="tab-pill ${b2bSubView==='dashboard'&&!b2bSelectedProgramaId?'active':''}" onclick="_b2bNavigate('dashboard')">Dashboard</button>
    <button class="tab-pill ${b2bSubView==='empresas'&&!b2bSelectedProgramaId?'active':''}" onclick="_b2bNavigate('empresas')">Empresas</button>
    <button class="tab-pill ${(b2bSubView==='programas'||b2bSelectedProgramaId)?'active':''}" onclick="_b2bNavigate('programas')">Programas</button>
  </div>
  <div style="flex:1"></div>
  ${b2bSubView==='empresas'&&!b2bSelectedProgramaId?`<button class="btn-green" onclick="openNewEmpresaModal()">+ Nueva empresa</button>`:''}
  ${b2bSubView==='programas'&&!b2bSelectedProgramaId?`<button class="btn-green" onclick="openNuevoProgramaModal(null)">+ Nuevo programa</button>`:''}
  ${b2bSelectedProgramaId?`<button class="btn-gray" style="font-size:11px;padding:6px 12px" onclick="_b2bNavigate('programas')">← Programas</button><button class="btn-outline" style="font-size:11px;padding:6px 12px" onclick="openImportModal(${b2bSelectedProgramaId})">⬆ Importar CSV</button><button class="btn-green" style="font-size:11px;padding:7px 14px" onclick="openNuevoParticipanteModal(${b2bSelectedProgramaId})">+ Participante</button>`:''}
</div>`; }

function tabEmpresas(){
  if(b2bSelectedProgramaId) return _b2bNav()+_b2bProgramaDetalle();
  if(b2bSubView==='dashboard') return _b2bNav()+_b2bDashboard();
  if(b2bSubView==='empresas') return _b2bNav()+_b2bEmpresas();

function _b2bDashboard(){
  const totalEmpresas=EMPRESAS.length;
  const totalProgramas=PROGRAMAS.length;
  const activos=PROGRAMAS.filter(p=>p.estado==='activo').length;

        <div style="font-weight:700;font-size:13px;margin-bottom:14px">Programas activos</div>

          const rows=PROGRAMAS.filter(p=>p.estado==='activo').map(prog=>{

            return '<div style="padding:12px 0;border-bottom:1px solid #f3f4f6;cursor:pointer" onclick="b2bSelectedProgramaId='+prog.id+';b2bSubView=\'programas\';b2bSearchText=\'\';b2bFilterEstado=\'todos\';b2bFilterPsico=\'\';rerender()">'

      </div>
    </div>
  </div>`;}

function parseCsvB2B(event){
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split('\n').map(l=>l.trim()).filter(l=>l);
    _b2bImportRows=[]; let start=0;
    const firstCols=lines[0].split(/[,;]/).map(c=>c.toLowerCase().replace(/"/g,''));
    if(firstCols.some(c=>c.includes('nombre')||c.includes('name')||c.includes('email'))) start=1;
    for(let i=start;i<lines.length;i++){
      const cols=lines[i].split(/[,;]/).map(c=>c.replace(/^"|"$/g,'').trim());
      if(cols.length<2) continue;
      _b2bImportRows.push({nombre:cols[0]||'',apellidos:cols[1]||'',email:cols[2]||'',telefono:cols[3]||'',fecha_nacimiento:cols[4]||''});
    }
    const preview=document.getElementById('csvPreview');
    if(_b2bImportRows.length===0){ preview.innerHTML=`<div style="color:#b91c1c;font-size:12px">No se encontraron datos válidos. Revisa el formato.</div>`; document.getElementById('importBtn').disabled=true; document.getElementById('importBtn').style.opacity='.5'; return; }
    const prog=PROGRAMAS.find(p=>p.id===_b2bImportProgramaId);
    const prefix=prog.prefijo_codigo||'COD';
    const existing=PARTICIPANTES.filter(p=>p.programa_id===_b2bImportProgramaId).map(p=>parseInt(p.codigo.replace(prefix,''))||0);
    let nextNum=existing.length?Math.max(...existing)+1:1;
    preview.innerHTML=`<div style="font-size:12px;font-weight:600;color:#065f46;margin-bottom:8px">Vista previa — ${_b2bImportRows.length} participantes detectados</div>
      <div style="max-height:200px;overflow:auto;border:1px solid #e5e7eb;border-radius:8px">
        <div style="display:grid;grid-template-columns:80px 1.5fr 1.5fr 1fr 1fr;padding:8px 12px;background:#f9fafb;border-bottom:1px solid #e5e7eb;font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase"><div>Código</div><div>Nombre</div><div>Email</div><div>Teléfono</div><div>F. Nacimiento</div></div>
        ${_b2bImportRows.map(r=>{const cod=prefix+String(nextNum++).padStart(3,'0');return `<div style="display:grid;grid-template-columns:80px 1.5fr 1.5fr 1fr 1fr;padding:8px 12px;border-bottom:1px solid #f3f4f6;font-size:11px"><div style="font-family:monospace;font-weight:700;color:#374151">${cod}</div><div>${r.nombre} ${r.apellidos}</div><div style="color:#6b7280">${r.email}</div><div style="color:#6b7280">${r.telefono}</div><div style="color:#6b7280">${r.fecha_nacimiento}</div></div>`;}).join('')}
      </div>`;
    document.getElementById('importBtn').disabled=false; document.getElementById('importBtn').style.opacity='1';
  };
  reader.readAsText(file);}

function doImportB2B(){
  if(!_b2bImportRows.length) return;
  const prog=PROGRAMAS.find(p=>p.id===_b2bImportProgramaId);
  const prefix=prog.prefijo_codigo||'COD';
  const existing=PARTICIPANTES.filter(p=>p.programa_id===_b2bImportProgramaId).map(p=>parseInt(p.codigo.replace(prefix,''))||0);
  let nextNum=existing.length?Math.max(...existing)+1:1;
  _b2bImportRows.forEach(r=>{
    const cod=prefix+String(nextNum++).padStart(3,'0');
    PARTICIPANTES.push({id:Date.now()+nextNum,programa_id:_b2bImportProgramaId,nombre:r.nombre,apellidos:r.apellidos,email:r.email,telefono:r.telefono,fecha_nacimiento:r.fecha_nacimiento,codigo:cod,idioma:'Español',psicologa:'',sesiones_realizadas:0,fecha_inicio_sesiones:'',fecha_fin_sesiones:'',encuesta_pre:'pendiente',encuesta_post:'pendiente',estado:'en_curso',comentarios:''});
  });
  closeModal(); b2bSelectedProgramaId=_b2bImportProgramaId; rerender();}

function tabFacturacion(){
  const MONTHS=['Abril 2026','Marzo 2026','Febrero 2026','Enero 2026'];
  if(!window._facMes) window._facMes='Abril 2026';
  const mes=window._facMes;

  const allPagos=PATIENTS.flatMap(p=>p.pagos||[]);
  const pagosMes=allPagos.filter(pg=>pg.mes===mes&&pg.estado!=='empresa');
  const ingPacMes=pagosMes.reduce((a,pg)=>a+(pg.importe||0),0);
  const ingEmp=0;
  const costePsy=PSYCHOLOGISTS.filter(p=>p.status==='activo').reduce((a,p)=>a+(p.sesiones_mes*p.tarifa),0);
  const margen=ingPacMes+ingEmp-costePsy;

  const getQualPats=(psicoId)=>PATIENTS.filter(p=>p.psico===psicoId&&p.tipo==='particular'&&!p.empresa&&!p.influencerCode);
  const psyRows=PSYCHOLOGISTS.filter(p=>p.status==='activo').map(p=>{
    const sesExt=p.sesionesExternas||0;
    const sesCan=p.canceladasCobro||0;
    const totalSes=p.sesiones_mes+sesExt+sesCan;
    const bruto=parseFloat((totalSes*p.tarifa).toFixed(2));
    const qualPats=getQualPats(p.id);
    const bonusAmt=p.bonusActivo?parseFloat((qualPats.length*20).toFixed(2)):0;
    const irpfAmt=parseFloat(((bruto+bonusAmt)*(p.irpf||7)/100).toFixed(2));
    const neto=parseFloat((bruto+bonusAmt-irpfAmt).toFixed(2));
    return {...p,sesExt,sesCan,totalSes,bruto,bonusAmt,qualPats,irpfAmt,neto};
  });
  const totalNeto=psyRows.reduce((a,r)=>a+r.neto,0);
  const totalIRPF=psyRows.reduce((a,r)=>a+r.irpfAmt,0);
  const totalBonus=psyRows.reduce((a,r)=>a+r.bonusAmt,0);
  const pendientePago=psyRows.filter(r=>r.liquidacion?.estado==='pendiente').reduce((a,r)=>a+r.neto,0);

  const activosSinEmp=PATIENTS.filter(p=>p.status==='activo'&&!p.empresa);
  const proxCaducar=PATIENTS.filter(p=>{
    if(!p.caducidad||p.status!=='activo') return false;
    const parts=p.caducidad.split(' ');
    const meses={Ene:0,Feb:1,Mar:2,Abr:3,May:4,Jun:5,Jul:6,Ago:7,Sep:8,Oct:9,Nov:10,Dic:11};
    const d=new Date(parseInt(parts[2]),meses[parts[1]],parseInt(parts[0]));
    const diff=(d-new Date())/(1000*60*60*24);
    return diff>=0&&diff<=30;
  });

  const pillStyle=(active)=>active
    ?'padding:8px 20px;border-radius:20px;border:none;cursor:pointer;font-weight:700;font-size:13px;background:#111827;color:#fff'
    :'padding:8px 20px;border-radius:20px;border:none;cursor:pointer;font-weight:600;font-size:13px;background:transparent;color:#6b7280';

  return `<div style="flex:1;overflow:auto;padding:24px 28px" class="fadeUp">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <h2 style="font-size:20px;font-weight:800;color:#111827">Facturación global</h2>
      <div style="display:flex;gap:10px;align-items:center">
        <select class="field-input" style="font-size:12px;padding:7px 12px;width:auto"
          onchange="window._facMes=this.value;rerender()">
          ${MONTHS.map(m=>`<option ${m===mes?'selected':''}>${m}</option>`).join('')}
        </select>
        <button class="btn-green" style="padding:8px 16px;font-size:12px" onclick="downloadAllFacturas(window._facMes)">&#8595; Descargar todo</button>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px">
      ${[
        {l:'Ingresos pacientes',v:`${ingPacMes.toLocaleString('es')} €`,s:mes,a:'#20dc95'},
        {l:'Ingresos empresas',  v:`${ingEmp.toLocaleString('es')} €`,  s:'contratos activos',a:'#8b5cf6'},
        {l:'Coste psicólogas',   v:`${costePsy.toLocaleString('es')} €`,s:'neto a liquidar',a:'#f59e0b'},
        {l:'Margen estimado',    v:`${margen.toLocaleString('es')} €`,  s:'este mes',a:margen>=0?'#3b82f6':'#ef4444'},
      ].map(s=>`<div class="scard" style="border-left:3px solid ${s.a}">
        <div style="font-size:11px;color:#6b7280;font-weight:500;margin-bottom:3px">${s.l}</div>
        <div style="font-size:20px;font-weight:800;color:#111827">${s.v}</div>
        <div style="font-size:11px;color:#9ca3af">${s.s}</div>

function marcarLiquidada(psicoId){
  const p=PSYCHOLOGISTS.find(x=>x.id===psicoId); if(!p) return;
  if(!p.liquidacion) p.liquidacion={};
  p.liquidacion.estado=p.liquidacion.estado==='pagada'?'pendiente':'pagada';
  rerender();
  showToast(`${p.name} — liquidación marcada como ${p.liquidacion.estado} ✓`);
}
function toggleBonus(psicoId){
  const p=PSYCHOLOGISTS.find(x=>x.id===psicoId); if(!p) return;
  p.bonusActivo=!p.bonusActivo;
  rerender();
  showToast(`${p.name} — bonus ${p.bonusActivo?'activado':'desactivado'} ✓`);
}

function downloadAllFacturas(mes){

    const totalSes=p.sesiones_mes+(p.sesionesExternas||0)+(p.canceladasCobro||0);

    return {...p,totalSes,bruto,bonusAmt,irpf,neto:parseFloat((base-irpf).toFixed(2))};

  ${allPagos.map(pg=>`<tr>
    <td>${pg.paciente}</td>
    <td>${pg.concepto||'—'}</td>
    <td>${pg.tipoTerapia||'—'}</td>
    <td>${pg.codigoPromo?`<span class="badge blue">${pg.codigoPromo}</span>`:'—'}</td>
    <td class="num">${pg.importe} €</td>
    <td>${pg.metodoPago||'—'}</td>
    <td><span class="badge ${pg.estado==='pagado'?'green':'amber'}">${pg.estado}</span></td>
  </tr>`).join('')}
  <tr class="total-row"><td colspan="4"><strong>TOTAL PACIENTES</strong></td><td class="green">${ingPac} €</td><td colspan="2"></td></tr>
  </tbody></table>`:'<p style="color:#9ca3af;font-size:11px;margin:8px 0 16px">Sin cobros de pacientes este mes.</p>';

  const psyTable=`<div class="section-sep"></div>
  <h2>Liquidación psicólogas</h2>
  <table><thead><tr><th>Psicóloga</th><th>Tarifa</th><th style="text-align:right">Ses.</th><th style="text-align:right">Ext.</th><th style="text-align:right">Can.</th><th style="text-align:right">Bruto</th><th style="text-align:right">Bonus</th><th style="text-align:right">IRPF</th><th style="text-align:right">Neto</th><th>Estado</th></tr></thead><tbody>
  ${psyRows.map(p=>`<tr>
    <td><strong>${p.name}</strong><br><span style="color:#9ca3af;font-size:9px">${p.colegiado} · ${p.cuenta||'Sin IBAN'}</span></td>
    <td>${p.tarifa} €/ses</td>
    <td class="num">${p.sesiones_mes}</td>
    <td class="num" style="color:#3b82f6">${p.sesionesExternas||0}</td>
    <td class="num" style="color:#d97706">${p.canceladasCobro||0}</td>
    <td class="num">${p.bruto.toFixed(2)} €</td>
    <td class="num" style="color:#6b21a8">${p.bonusAmt>0?'+'+p.bonusAmt.toFixed(2)+' €':'—'}</td>
    <td class="red">- ${p.irpf.toFixed(2)} €</td>
    <td class="green">${p.neto.toFixed(2)} €</td>

  </tr>`).join('')}
  <tr class="total-row"><td colspan="5"><strong>TOTAL A LIQUIDAR</strong></td><td class="num">${psyRows.reduce((a,r)=>a+r.bruto,0).toFixed(2)} €</td><td class="num" style="color:#6b21a8">+${psyRows.reduce((a,r)=>a+r.bonusAmt,0).toFixed(2)} €</td><td class="red">- ${psyRows.reduce((a,r)=>a+r.irpf,0).toFixed(2)} €</td><td class="green">${totalNeto.toFixed(2)} €</td><td></td></tr>
  </tbody></table>`;

function savePatRenov(id){
  const p=PATIENTS.find(x=>x.id===id); if(!p) return;
  const el=document.getElementById(`pat-renov-${id}`);
  if(!el) return;
  p.precioRenovacion=parseInt(el.value)||p.precioRenovacion;
  rerender(); showToast(`Precio de renovación de ${p.name} actualizado ✓`);
}

function applyBulkIncrease(){
  const inc=parseInt(document.getElementById('bulk-increment')?.value)||0;
  if(!inc){showToast('⚠️ Indica una cantidad');return;}
  const affected=PATIENTS.filter(p=>p.precioRenovacion!=null&&p.status==='activo'&&!p.empresa);
  let capped=0;
  affected.forEach(p=>{
    const svc=SERVICES.find(s=>p.tipoTerapia==='pareja'?s.category==='pareja'&&s.name.toLowerCase().includes('bono'):s.category==='particular'&&s.name.toLowerCase().includes('bono'));
    const standard=svc?.precio||232;
    const newPrice=Math.round((p.precioRenovacion+inc)*100)/100;
    if(newPrice>=standard){p.precioRenovacion=null;capped++;}
    else{p.precioRenovacion=newPrice;}
  });
  rerender();
  showToast(capped>0?`+${inc}€ aplicado. ${capped} usuario${capped>1?'s':''} han alcanzado el precio estándar ✓`:`+${inc}€ aplicado a ${affected.length} usuarios ✓`);
}

function confirmPriceChange(){
  const changes=[];
  SERVICES.forEach(s=>{
    const el=document.getElementById(`svc-price-${s.id}`); if(!el) return;
    const newVal=parseInt(el.value);
    if(newVal!==s.precio) changes.push({s,newVal,diff:newVal-s.precio});
  });
  if(changes.length===0){showToast('Sin cambios en precios');return;}
  const activos=PATIENTS.filter(p=>p.status==='activo'&&!p.empresa&&p.precioRenovacion==null);
  const lines=changes.map(c=>`
    <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f3f4f6">
      <span style="font-size:13px;color:#374151">${c.s.name}</span>
      <span style="font-weight:700;color:#111827">${c.s.precio}€ → ${c.newVal}€
        <span style="font-size:11px;color:${c.diff>0?'#b91c1c':'#16a34a'}">(${c.diff>0?'+':''}${c.diff}€)</span>
      </span>
    </div>`).join('');
  showModal(`<div class="modal-box" style="width:480px">
    <div style="padding:18px 24px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center">
      <div style="font-weight:700;font-size:15px;color:#111827">Guardar cambio de precios</div>
      <button onclick="closeModal()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#9ca3af">✕</button>
    </div>
    <div style="padding:20px 24px">
      <div style="margin-bottom:16px">${lines}</div>
      ${activos.length>0?`<div style="background:#eff6ff;border-radius:8px;padding:11px 14px;font-size:12px;color:#1e40af;margin-bottom:16px">
        <strong>${activos.length} usuarios activos</strong> aún sin precio de renovación propio.<br>
        ¿Quieres fijarles el precio actual antes de subirlo?
      </div>`:''}
      <div style="display:flex;flex-direction:column;gap:8px">
        ${activos.length>0?`<button onclick="applyPriceChange('lock')"
          style="padding:12px 16px;border-radius:10px;border:1.5px solid #20dc95;background:#f0fdf4;text-align:left;cursor:pointer">
          <div style="font-weight:700;font-size:13px;color:#065f46">Fijar precio actual a usuarios sin precio propio y actualizar</div>
          <div style="font-size:11px;color:#6b7280;margin-top:3px">Los ${activos.length} usuarios sin precio fijado se quedan en el precio anterior. Luego puedes subirles de forma paulatina.</div>
        </button>`:''}
        <button onclick="applyPriceChange('all')"
          style="padding:12px 16px;border-radius:10px;border:1.5px solid ${activos.length>0?'#fecaca':'#20dc95'};background:${activos.length>0?'#fff':'#f0fdf4'};text-align:left;cursor:pointer">
          <div style="font-weight:700;font-size:13px;color:${activos.length>0?'#b91c1c':'#065f46'}">Aplicar a todos los usuarios</div>
          <div style="font-size:11px;color:#6b7280;margin-top:3px">Todos los usuarios pagarán el nuevo precio al renovar, incluidos los que ya tienen precio fijado.</div>
        </button>
      </div>
    </div>
  </div>`);
  window._pendingPriceChanges=changes;
}

function applyPriceChange(mode){
  const changes=window._pendingPriceChanges||[];
  changes.forEach(({s,newVal})=>{
    if(mode==='lock'){
      PATIENTS.filter(p=>p.status==='activo'&&!p.empresa&&p.precioRenovacion==null)
        .forEach(p=>{ p.precioRenovacion=s.precio; });
    } else {
      PATIENTS.forEach(p=>{ p.precioRenovacion=null; });
    }
    s.precio=newVal;
  });
  window._pendingPriceChanges=[];
  closeModal(); rerender();
  showToast(mode==='lock'
    ?'Precios actualizados. Usuarios activos tienen precio anterior fijado ✓'
    :'Nuevo precio aplicado a todos ✓');
}

          <div style="font-size:10px;color:#b45309;margin-top:2px">Holded está homologado por AEAT. Al conectar esta clave, las facturas se registran automáticamente con QR verificable.</div>
        </div>
      </div>

      <!-- Whereby -->
      <div class="card">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
          <div style="width:34px;height:34px;border-radius:9px;background:#ff5b5b;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;flex-shrink:0">W</div>
          <div style="flex:1">
            <div style="font-weight:700;font-size:13px;color:#111827">Whereby</div>
            <div style="font-size:10px;color:#9ca3af">Videollamadas de sesión</div>
          </div>
          <span style="background:#fef3c7;color:#92400e;font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px">Por conectar</span>
        </div>
        <div style="margin-bottom:10px">
          <label class="field-label">URL base de sala</label>
          <input id="aj-whereby_base" class="field-input" value="${g('whereby_base','https://whereby.com/popempower-')}" placeholder="https://whereby.com/sala-base-" style="font-family:monospace;font-size:11px"/>
        </div>
        <div style="font-size:10px;color:#9ca3af;margin-bottom:8px">La sala de cada psicóloga = URL base + iniciales (ej: popempower-EG)</div>
        <div style="padding:10px;background:#eff6ff;border-radius:7px;border-left:3px solid #3b82f6">
          <div style="font-size:10px;font-weight:700;color:#1e40af">API Whereby (opcional)</div>
          <div style="font-size:10px;color:#1d4ed8;margin-top:2px">Sin API: las salas se crean manualmente. Con API: se generan automáticamente al activar una psicóloga.</div>
        </div>
      </div>
    </div>

    <!-- EMAIL TRANSACCIONAL -->
    <div style="margin-top:20px">
      <div style="font-weight:700;font-size:15px;color:#111827;margin-bottom:4px">✉ Email transaccional</div>
      <div style="font-size:12px;color:#6b7280;margin-bottom:14px">Configura el proveedor de envío de emails automáticos (confirmaciones, recordatorios, liquidaciones).</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">

        <!-- Resend -->
        <div style="background:#fafafa;border:1px solid #e5e7eb;border-radius:10px;padding:16px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
            <div style="width:28px;height:28px;background:#111827;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff">R</div>
            <div style="font-weight:700;font-size:13px">Resend</div>
            <span style="background:#fef3c7;color:#92400e;font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px">Por conectar</span>
          </div>
          <div style="margin-bottom:10px">
            <label class="field-label">API Key</label>
            <input id="aj-resend_key" class="field-input" value="${g('resend_key','')}" placeholder="re_xxxxxxxxxxxxxxxxxxxx" style="font-family:monospace;font-size:11px"/>
          </div>
          <div style="margin-bottom:10px">
            <label class="field-label">Email remitente</label>
            <input id="aj-email_from" class="field-input" value="${g('email_from','hola@popempower.com')}" placeholder="hola@popempower.com"/>
          </div>
          <div style="margin-bottom:8px">
            <label class="field-label">Nombre remitente</label>
            <input id="aj-email_name" class="field-input" value="${g('email_name','POP Empower')}" placeholder="POP Empower"/>
          </div>
          <div style="padding:10px;background:#f0fdf8;border-radius:7px;border-left:3px solid #20dc95">
            <div style="font-size:10px;font-weight:700;color:#065f46">Alternativa: SendGrid</div>
            <div style="font-size:10px;color:#047857;margin-top:2px">Si prefieres SendGrid, usa su API key aquí. La integración funciona igual.</div>
          </div>
        </div>

        <!-- Triggers -->
        <div style="background:#fafafa;border:1px solid #e5e7eb;border-radius:10px;padding:16px">
          <div style="font-weight:700;font-size:13px;margin-bottom:12px">Emails automáticos</div>
          ${[
            ['Bienvenida al registrarse','email_t_welcome',true],
            ['Confirmación de sesión reservada','email_t_booking',true],
            ['Recordatorio 24h antes de sesión','email_t_reminder24',true],
            ['Bono a punto de caducar (48h)','email_t_bono_exp',true],
            ['Liquidación mensual a psicólogas','email_t_liquidacion',true],
            ['Factura al paciente tras pago','email_t_factura',true],
          ].map(([label,key,def])=>{
            const on = g(key, def?'1':'0')==='1';
            return `<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f3f4f6">
              <span style="font-size:11px;color:#374151">${label}</span>
              <button onclick="const v=localStorage.getItem('pop_ajustes');const o=v?JSON.parse(v):{};o['${key}']=o['${key}']==='1'?'0':'1';localStorage.setItem('pop_ajustes',JSON.stringify(o));rerender();showToast('Guardado ✓')" style="width:36px;height:20px;border-radius:10px;border:none;background:${on?'#20dc95':'#e5e7eb'};cursor:pointer;position:relative;transition:background .2s;flex-shrink:0">
                <div style="width:14px;height:14px;border-radius:50%;background:#fff;position:absolute;top:3px;${on?'right:3px':'left:3px'};transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)"></div>
              </button>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════════════════════
// MODALS
// ══════════════════════════════════════════════════════════════════
function openPsicoModal(id){
  const p = PSYCHOLOGISTS.find(x=>x.id===id); if(!p) return;
  const tab = psicoModalTab;
  const myPats = PATIENTS.filter(x=>x.psico===id);
  const tabs = [['perfil','Perfil'],['tarifas','Tarifas'],['disponibilidad','Disponibilidad'],['contrato','Contrato'],['pacientes',`Pacientes (${myPats.length})`]];

  const tabNav = `<div style="display:flex;gap:0;padding:0 24px;border-bottom:1px solid #e5e7eb">
    ${tabs.map(([v,l])=>`<button onclick="psicoModalTab='${v}';openPsicoModal(${id})" style="padding:10px 16px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:${tab===v?'700':'500'};color:${tab===v?'#111827':'#9ca3af'};border-bottom:2px solid ${tab===v?'#20dc95':'transparent'};margin-bottom:-1px;transition:all .12s">${l}</button>`).join('')}
  </div>`;

  let content = '';
  let footerAction = `<button onclick="savePsicoModal(${id})" class="btn-green">Guardar cambios</button>`;

  if(tab === 'perfil'){
    content = `<div style="padding:20px 24px;display:grid;grid-template-columns:1fr 1fr;gap:18px">
      <div style="display:flex;flex-direction:column;gap:11px">
        <div style="font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.06em">Datos personales</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div><label class="field-label">Nombre</label><input class="field-input" id="pm-nombre-${id}" value="${p.name.split(' ')[0]}"/></div>
          <div><label class="field-label">Apellidos</label><input class="field-input" id="pm-apellidos-${id}" value="${p.name.split(' ').slice(1).join(' ')}"/></div>
        </div>
        <div><label class="field-label">Email</label><input class="field-input" id="pm-email-${id}" value="${p.email}"/></div>
        <div><label class="field-label">Teléfono</label>${phoneInputHTML('pm-phone-'+id,p.phone||'')}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div><label class="field-label">Fecha de nacimiento</label><input class="field-input" type="date" id="pm-nac-${id}" value="${toDateInput(p.nacimiento||'')}"/></div>
          <div><label class="field-label">DNI / NIE</label><input class="field-input" id="pm-dni-${id}" value="${p.dni||''}"/></div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:11px">
        <div style="font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.06em">Datos profesionales</div>
        <div><label class="field-label">Ciudad</label><input class="field-input" id="pm-ciudad-${id}" value="${p.ciudad}"/></div>
        <div><label class="field-label">Nº Colegiado</label><input class="field-input" id="pm-col-${id}" value="${p.colegiado}"/></div>
        <div>
          <div style="font-size:11px;font-weight:600;color:#374151;margin-bottom:6px">Idiomas</div>
          <div style="display:flex;flex-wrap:wrap;gap:5px">${p.idiomas.map(i=>`<span class="badge blue" style="font-size:11px">${i}</span>`).join('')||'<span style="font-size:11px;color:#9ca3af">Sin especificar</span>'}</div>
        </div>
        <div>
          <div style="font-size:11px;font-weight:600;color:#374151;margin-bottom:6px">Especialidades</div>
          <div style="display:flex;flex-wrap:wrap;gap:5px">${p.especialidades.length?p.especialidades.map(e=>`<span class="badge green" style="font-size:11px">${e}</span>`).join(''):'<span style="font-size:11px;color:#9ca3af">Sin especificar</span>'}</div>
        </div>
      </div>
    </div>`;
  }

  if(tab === 'tarifas'){
    const qualPats=PATIENTS.filter(pt=>pt.psico===id&&pt.tipo==='particular'&&!pt.empresa&&!pt.influencerCode);
    const bonusMes=p.bonusActivo?qualPats.length*20:0;
    const bruto = p.sesiones_mes * p.tarifa;
    const base = bruto + bonusMes;
    const neto = base * (1 - (p.irpf||7)/100);
    content = `<div style="padding:20px 24px;display:flex;flex-direction:column;gap:14px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div>
          <label class="field-label">Tarifa sesión individual (€)</label>
          <div style="display:flex;align-items:center;gap:8px">
            <input type="number" value="${p.tarifa}" min="10" max="200" step="5" id="modal-tarifa-${id}"
              style="width:90px;padding:8px 12px;border-radius:8px;border:1.5px solid #e5e7eb;font-size:16px;font-weight:800;color:#065f46;outline:none;text-align:center"
              onfocus="this.style.borderColor='#20dc95'" onblur="this.style.borderColor='#e5e7eb'"/>
            <span style="font-size:13px;color:#374151">€ / ses</span>
          </div>
        </div>
        <div>
          <label class="field-label">IRPF (%)</label>
          <div style="display:flex;align-items:center;gap:8px">
            <input type="number" value="${p.irpf}" min="0" max="50" step="0.5" id="modal-irpf-${id}"
              style="width:72px;padding:8px 12px;border-radius:8px;border:1.5px solid #e5e7eb;font-size:15px;font-weight:700;color:#374151;outline:none;text-align:center"
              onfocus="this.style.borderColor='#20dc95'" onblur="this.style.borderColor='#e5e7eb'"/>
            <span style="font-size:13px;color:#374151">%</span>
          </div>
        </div>
      </div>
      <div style="padding:14px;background:#faf5ff;border-radius:8px;border:1px solid #e9d5ff">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div style="font-size:13px;font-weight:700;color:#6b21a8">Terapia de pareja</div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:11px;color:#6b7280">${p.haceParejas?'Activa':'Inactiva'}</span>
            <button class="toggle" style="background:${p.haceParejas?'#8b5cf6':'#e5e7eb'}" onclick="PSYCHOLOGISTS.find(x=>x.id===${id}).haceParejas=!PSYCHOLOGISTS.find(x=>x.id===${id}).haceParejas;openPsicoModal(${id})">
              <div class="toggle-knob" style="left:${p.haceParejas?'19px':'2px'}"></div>
            </button>
          </div>
        </div>
        ${p.haceParejas?`<div style="display:flex;align-items:center;gap:8px">
          <label class="field-label" style="margin:0;white-space:nowrap">Tarifa pareja:</label>
          <input type="number" value="${p.tarifaPareja||45}" min="10" max="300" step="5" id="modal-tarifa-pareja-${id}"
            style="width:80px;padding:6px 10px;border-radius:7px;border:1.5px solid #e9d5ff;font-size:15px;font-weight:800;color:#6b21a8;outline:none;text-align:center;background:#fff"
            onfocus="this.style.borderColor='#8b5cf6'" onblur="this.style.borderColor='#e9d5ff'"/>
          <span style="font-size:13px;color:#374151">€ / sesión pareja</span>
        </div>`:`<div style="font-size:12px;color:#9ca3af">Activa el toggle para fijar una tarifa de pareja distinta.</div>`}
      </div>
      <div><label class="field-label">IBAN (transferencias)</label>
        <input class="field-input" id="modal-iban-${id}" value="${p.cuenta||''}" placeholder="ES00 0000 0000 00 0000000000" style="font-family:monospace"/>
      </div>
      <div style="padding:14px;background:${p.bonusActivo?'#f5f3ff':'#fafafa'};border-radius:8px;border:1px solid ${p.bonusActivo?'#e9d5ff':'#e5e7eb'}">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div>
            <div style="font-size:13px;font-weight:700;color:${p.bonusActivo?'#6b21a8':'#374151'}">Bonus trimestral</div>
            <div style="font-size:11px;color:#6b7280;margin-top:2px">${p.bonusActivo?`${qualPats.length} pac. particulares × 20€ = ${bonusMes}€`:'No percibe bonus trimestral'}</div>
            ${p.bonusActivo&&qualPats.length>0?`<div style="font-size:10px;color:#9ca3af;margin-top:2px">${qualPats.map(pt=>pt.name).join(' · ')}</div>`:''}
          </div>
          <button class="toggle" style="background:${p.bonusActivo?'#8b5cf6':'#e5e7eb'};flex-shrink:0;margin-left:12px" onclick="toggleBonus(${id});openPsicoModal(${id})">
            <div class="toggle-knob" style="left:${p.bonusActivo?'19px':'2px'}"></div>
          </button>
        </div>
      </div>
      <div style="padding:12px 16px;background:#fffbeb;border-radius:8px;border-left:3px solid #f59e0b">
        <div style="font-size:11px;font-weight:700;color:#92400e;margin-bottom:4px">Liquidación estimada este mes</div>
        <div style="font-size:20px;font-weight:800;color:#111827">${neto.toFixed(2)} €</div>
        <div style="font-size:11px;color:#b45309">${p.sesiones_mes} ses × ${p.tarifa}€ = ${bruto.toFixed(2)}€${bonusMes>0?` + ${bonusMes}€ bonus`:''} − ${p.irpf||7}% IRPF</div>
      </div>
    </div>`;
  }

  if(tab === 'disponibilidad'){
    const dias=[{k:'lun',l:'Lunes'},{k:'mar',l:'Martes'},{k:'mie',l:'Miércoles'},{k:'jue',l:'Jueves'},{k:'vie',l:'Viernes'},{k:'sab',l:'Sábado'},{k:'dom',l:'Domingo'}];
    const disp=p.disponibilidad||{};
    content=`<div style="padding:20px 24px;display:flex;flex-direction:column;gap:16px">
      <div>
        <div style="font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Disponibilidad semanal</div>
        <div style="font-size:11px;color:#9ca3af;margin-bottom:10px">Configurada por la psicóloga desde su panel. Edita aquí si es necesario.</div>
        <div style="border:1px solid #e5e7eb;border-radius:8px;overflow:hidden">
          ${dias.map(d=>`<div style="display:grid;grid-template-columns:100px 1fr;align-items:center;padding:9px 16px;border-bottom:1px solid #f3f4f6">
            <span style="font-size:12px;font-weight:600;color:#374151">${d.l}</span>
            ${disp[d.k]&&disp[d.k]!=='—'
              ?`<span style="font-size:12px;color:#065f46;font-weight:600;background:#f0fdf8;padding:3px 10px;border-radius:4px;width:fit-content">${disp[d.k]}</span>`
              :`<span style="font-size:12px;color:#d1d5db">Sin disponibilidad</span>`}
          </div>`).join('')}
        </div>
      </div>
      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div style="font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.06em">Vacaciones / Ausencias</div>
          <button onclick="addVacacion(${id})" style="font-size:11px;font-weight:600;color:#20dc95;background:none;border:none;cursor:pointer">+ Añadir período</button>
        </div>
        ${p.vacaciones&&p.vacaciones.length
          ?p.vacaciones.map((v,i)=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#fafafa;border-radius:7px;border:1px solid #e5e7eb;margin-bottom:6px">
            <span style="font-size:12px;color:#374151">📅 ${v.desde} → ${v.hasta}</span>
            <button onclick="PSYCHOLOGISTS.find(x=>x.id===${id}).vacaciones.splice(${i},1);openPsicoModal(${id})" style="background:none;border:none;cursor:pointer;color:#ef4444;font-size:14px">✕</button>
          </div>`).join('')
          :`<div style="font-size:12px;color:#9ca3af;text-align:center;padding:20px;background:#fafafa;border-radius:8px;border:1px dashed #e5e7eb">Sin períodos de ausencia registrados</div>`}
      </div>
    </div>`;
    footerAction = `<button onclick="savePsicoModal(${id})" class="btn-green">Guardar disponibilidad</button>`;
  }

  if(tab === 'pacientes'){
    const TIPO_MAP = {individual:['blue','Individual'],pareja:['purple','Pareja'],familia:['amber','Familia']};
    content = myPats.length ? `<div style="padding:0;overflow:hidden">
      <div class="thead" style="grid-template-columns:2fr 1fr 1.2fr 1fr 80px;padding:9px 20px">
        ${['Paciente','Tipo terapia','Plan / Compra','Sesiones','Estado'].map(h=>
          `<div style="font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em">${h}</div>`).join('')}
      </div>
      ${myPats.map(pt=>{
        const st=PAT_STATUS[pt.status];
        const [tc,tl]=TIPO_MAP[pt.tipoTerapia]||['gray',pt.tipoTerapia||'—'];
        const pct=Math.round(pt.usado/pt.total*100);
        return `<div class="trow" style="grid-template-columns:2fr 1fr 1.2fr 1fr 80px;cursor:pointer" onclick="closeModal();openPatientModal(${pt.id})">
          <div style="display:flex;align-items:center;gap:9px">
            ${av(pt.initials,32,'#e5e7eb','#6b7280')}
            <div>
              <div style="font-weight:600;font-size:12px;color:#111827">${pt.name}</div>
              <div style="font-size:11px;color:#9ca3af">${pt.empresa?`<span style="background:#eff6ff;color:#1d4ed8;border-radius:3px;padding:1px 5px;font-size:10px">${compName(pt.empresa)}</span> `:''} Alta: ${pt.alta}</div>
            </div>
          </div>
          <span class="badge ${tc}" style="font-size:11px">${tl}</span>
          <div>
            <div style="font-size:12px;font-weight:600;color:#374151">${pt.plan}</div>
            <div style="font-size:11px;color:#9ca3af">${pt.precio>0?pt.precio+' €':'Empresa'}</div>
          </div>
          <div>
            <div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:3px">${pt.usado}/${pt.total} ses</div>
            ${pbar(pct,4)}
          </div>
          <span class="badge ${pt.status==='activo'?'green':pt.status==='pausa'?'amber':'gray'}" style="font-size:10px">${st.label}</span>
        </div>`;
      }).join('')}
    </div>`
    : `<div style="padding:40px 24px;text-align:center">
        <div style="font-size:32px;margin-bottom:10px">🧑</div>
        <div style="font-size:14px;font-weight:600;color:#374151">Sin pacientes asignados</div>
        <div style="font-size:12px;color:#9ca3af;margin-top:4px">Esta psicóloga no tiene pacientes en la plataforma todavía.</div>
      </div>`;
    footerAction = `<button onclick="closeModal();navigate('pacientes')" class="btn-green" style="font-size:12px">Ir a Pacientes →</button>`;
  }

  if(tab === 'contrato'){
    const ct=p.contrato||{firmado:false,fecha:null};
    content=`<div style="padding:20px 24px;display:flex;flex-direction:column;gap:14px">
      <div style="display:flex;align-items:flex-start;gap:14px;padding:16px 18px;background:${ct.firmado?'#f0fdf8':'#fffbeb'};border-radius:10px;border:1px solid ${ct.firmado?'#d1fae5':'#fde68a'}">
        <div style="font-size:26px">${ct.firmado?'✅':'⏳'}</div>
        <div>
          <div style="font-size:14px;font-weight:800;color:${ct.firmado?'#065f46':'#92400e'}">${ct.firmado?'Contrato firmado':'Contrato pendiente de firma'}</div>
          <div style="font-size:12px;color:${ct.firmado?'#059669':'#b45309'};margin-top:3px">${ct.firmado?`Firmado el ${ct.fecha}`:'La psicóloga aún no ha firmado el contrato de prestación de servicios'}</div>
        </div>
      </div>
      <div>
        <div style="font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Acciones</div>
        <div style="display:flex;flex-direction:column;gap:8px">

function savePsicoModal(id){
  const p=PSYCHOLOGISTS.find(x=>x.id===id); if(!p) return;
  const g=sel=>{const el=document.getElementById(sel);return el?el.value:null;};
  const tab=psicoModalTab;
  if(tab==='perfil'){
    const n=g(`pm-nombre-${id}`),ap=g(`pm-apellidos-${id}`);
    if(n) p.name=(n+' '+(ap||'')).trim();
    const e=g(`pm-email-${id}`); if(e) p.email=e;
    const ph=getPhone(`pm-phone-${id}`); if(ph) p.phone=ph;
    const nac=g(`pm-nac-${id}`); if(nac!==null) p.nacimiento=nac;
    const dni=g(`pm-dni-${id}`); if(dni!==null) p.dni=dni;
    const city=g(`pm-ciudad-${id}`); if(city) p.ciudad=city;
    const col=g(`pm-col-${id}`); if(col) p.colegiado=col;
    p.initials=(p.name.split(' ')[0]?.[0]||'')+(p.name.split(' ')[1]?.[0]||'');
  }
  if(tab==='tarifas'){
    const t=g(`modal-tarifa-${id}`); if(t) p.tarifa=parseInt(t)||p.tarifa;
    const i=g(`modal-irpf-${id}`); if(i) p.irpf=parseFloat(i)||p.irpf;
    const tp=g(`modal-tarifa-pareja-${id}`); if(tp) p.tarifaPareja=parseInt(tp)||p.tarifaPareja;
    const iban=g(`modal-iban-${id}`); if(iban!==null) p.cuenta=iban;
  }
  closeModal(); rerender();
  showToast('Cambios guardados correctamente ✓');
}

async function doAltaPsico(){
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
  const nombre=g('np-nombre'),apellidos=g('np-apellidos'),email=g('np-email'),col=g('np-col');
  if(!nombre||!apellidos||!email||!col){showToast('⚠️ Completa los campos obligatorios (*)');return;}

  const btn=document.querySelector('.modal-box .btn-green');
  if(btn){btn.disabled=true;btn.textContent='Enviando invitación...';}

  const tarifa=parseInt(g('np-tarifa'))||25;
  const tpRaw=parseInt(g('np-tarifa-pareja'));
  const tarifaPareja=isNaN(tpRaw)||g('np-tarifa-pareja')===''?null:tpRaw;
  const irpf=parseFloat(g('np-irpf'))||7;
  const fullName=`${nombre} ${apellidos}`;
  const redirectTo='https://plataforma-woad.vercel.app/login.html';

  // 1. Enviar invitación — Supabase manda el email automáticamente
  const {data:inviteData, error:inviteError} = await sbAdmin.auth.admin.inviteUserByEmail(email, {
    redirectTo,
    data:{ full_name:fullName, role:'psychologist' }
  });

  if(inviteError){
    if(btn){btn.disabled=false;btn.textContent='Dar de alta y enviar acceso';}
    const msg = inviteError.message.includes('already been registered')
      ? 'Este email ya tiene una cuenta en el sistema'
      : inviteError.message;
    showToast('❌ Error: '+msg);
    return;
  }

  const uid = inviteData.user.id;

  // 2. Insertar en profiles
  await sbAdmin.from('profiles').upsert({ id:uid, role:'psychologist', full_name:fullName });

  // 3. Insertar en psychologists
  const {error:psicoError} = await sbAdmin.from('psychologists').insert({
    id:uid, nombre, apellidos, email,
    phone:getPhone('np-phone'), colegiado:col,
    fecha_nac:g('np-nac')||null,
    tarifa, tarifa_pareja:tarifaPareja, irpf,
    status:'pendiente'
  });

  if(btn){btn.disabled=false;btn.textContent='Dar de alta y enviar acceso';}

  if(psicoError){
    showToast('⚠️ Invitación enviada pero error guardando perfil: '+psicoError.message);
    return;
  }

  const initials=((nombre[0]||'')+(apellidos[0]||'')).toUpperCase();
  PSYCHOLOGISTS.push({
    id:PSYCHOLOGISTS.length+100, name:fullName, initials, email,
    phone:getPhone('np-phone'), ciudad:'', colegiado:col,
    tarifa, tarifaPareja, haceParejas:tarifaPareja!==null,
    irpf, status:'pendiente', patients:0, sesiones_mes:0,
    especialidades:[], idiomas:[], vacaciones:[],
    alta:new Date().toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'}),
    contrato:{firmado:false,fecha:null},
    disponibilidad:{lun:'—',mar:'—',mie:'—',jue:'—',vie:'—',sab:'—',dom:'—'}
  });
  closeModal(); rerender();
  showToast(`✉️ Invitación enviada a ${email} — ${fullName} recibirá el email para activar su cuenta`);
}

async function doAltaPaciente(){
  const nombre=(document.getElementById('np-nombre')?.value||'').trim();
  const apellidos=(document.getElementById('np-apellidos')?.value||'').trim();
  const email=(document.getElementById('np-email')?.value||'').trim();
  const tel=getPhone('np-tel');
  const psicoId=parseInt(document.getElementById('np-psico')?.value)||null;
  const planName=document.getElementById('np-plan')?.value||'';
  const tipoTerapia=document.getElementById('np-terapia')?.value||'individual';

  if(!nombre||!email){showToast('⚠️ Nombre y email son obligatorios');return;}

  const psico=PSYCHOLOGISTS.find(p=>p.id===psicoId);
  const newId=Math.max(...PATIENTS.map(p=>p.id))+1;
  const infCode=(document.getElementById('np-inf-code')?.value||'').trim()||null;

  const colabSes=_npTipo==='influencer'?parseInt(document.getElementById('np-colab-ses')?.value)||0:0;
  PATIENTS.push({
    id:newId,
    name:nombre+(apellidos?' '+apellidos:''),
    email,phone:tel,
    psicologaId:psicoId,
    psico:psico?.id||null,
    tipo:_npTipo,
    influencerCode:_npTipo==='influencer'?infCode:null,
    empresa:null,
    plan:_npTipo==='influencer'&&colabSes?`${colabSes} sesiones colaboración`:planName,
    total:colabSes||4,
    usado:0,
    alta:new Date().toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'}),
    caducidad:null,
    status:'activo',
    tipoTerapia,
    sesiones:[],
    pagos:[]
  });

  if(psico) psico.patients=(psico.patients||0)+1;

  if(_npTipo==='influencer'){
    const infVal=parseInt(document.getElementById('np-inf-val')?.value)||3;
    const infMax=document.getElementById('np-inf-max')?.value?.trim();
    const infCad=document.getElementById('np-inf-cad')?.value;
    const fansCode=(document.getElementById('np-fans-code')?.value||'').trim()||null;
    const fansVal=parseInt(document.getElementById('np-fans-val')?.value)||15;
    const fansMax=document.getElementById('np-fans-max')?.value?.trim();
    const fansCad=document.getElementById('np-fans-cad')?.value;
    const fmtCad=v=>v?new Date(v).toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'}):'—';
    const nextId=Math.max(...PROMO_CODES.map(c=>c.id))+1;
    if(infCode) PROMO_CODES.push({id:nextId,code:infCode,type:'influencer',value:infVal,unit:'sesiones',uses:0,maxUses:infMax?parseInt(infMax):null,caducidad:fmtCad(infCad),status:'activo',description:`${infVal} sesiones gratuitas — ${nombre} (influencer, cuenta propia)`});
    if(fansCode) PROMO_CODES.push({id:nextId+1,code:fansCode,type:'referido',value:fansVal,unit:'%',uses:0,maxUses:fansMax?parseInt(fansMax):null,caducidad:fmtCad(fansCad),status:'activo',description:`${fansVal}% descuento — seguidores de ${nombre}`});

    const btn=document.querySelector('.modal-box .btn-green');
    if(btn){btn.disabled=true;btn.textContent='Enviando invite...';}
    const {error:invErr}=await sbAdmin.auth.admin.inviteUserByEmail(email,{
      redirectTo:'https://plataforma-woad.vercel.app/login.html',
      data:{full_name:nombre+(apellidos?' '+apellidos:''),role:'patient'}
    });
    if(btn){btn.disabled=false;}
    closeModal();rerender();
    if(invErr&&!invErr.message.includes('already been registered')){
      showToast(`⭐ ${nombre} creado + códigos — ⚠️ error invite: ${invErr.message}`);
    } else {
      showToast(`⭐ ${nombre} creado, ${colabSes} sesiones asignadas e invite enviado`);
    }
    return;
  }

  closeModal();rerender();
  showToast(`✓ Paciente ${nombre} creado`);}

  const c=PROMO_CODES.find(x=>x.id===id); if(!c) return;
  _promoEditId=id; _promoFormVals={};
  _promoType=c.type||'general';
  _promoDiscountType=c.discountType||'percent';
  _promoAppliesTo=[...(c.appliesTo||[])];
  _promoAudiencia=c.audiencia||'todos';
  _renderPromoModal();
}

function _savePromoVals(){
  ['pm-code','pm-desc','pm-value','pm-max-person','pm-max-total','pm-launch','pm-expiry'].forEach(id=>{
    const el=document.getElementById(id); if(el) _promoFormVals[id]=el.value;
  });
}
function setPromoType(t){_savePromoVals();_promoType=t;_renderPromoModal();}
function setPromoDiscountType(t){_savePromoVals();_promoDiscountType=t;_renderPromoModal();}
function setPromoAudiencia(a){_savePromoVals();_promoAudiencia=a;_renderPromoModal();}
function togglePromoApplies(k){
  _savePromoVals();
  const i=_promoAppliesTo.indexOf(k);
  if(i===-1) _promoAppliesTo.push(k); else _promoAppliesTo.splice(i,1);
  _renderPromoModal();
}
function togglePromoStatus(id){
  const c=PROMO_CODES.find(x=>x.id===id); if(!c) return;
  c.status=c.status==='activo'?'inactivo':'activo';
  rerender(); showToast(`Código ${c.code} ${c.status==='activo'?'activado':'desactivado'} ✓`);
}

function doCrearPromo(){
  const code=(document.getElementById('pm-code')?.value||'').trim().toUpperCase();
  const desc=(document.getElementById('pm-desc')?.value||'').trim();
  const value=parseFloat(document.getElementById('pm-value')?.value)||0;
  const maxPerson=document.getElementById('pm-max-person')?.value?.trim();
  const maxTotal=document.getElementById('pm-max-total')?.value?.trim();
  const launch=document.getElementById('pm-launch')?.value;
  const expiry=document.getElementById('pm-expiry')?.value;
  if(!code||!desc){showToast('⚠️ Código y descripción son obligatorios');return;}
  if(_promoAppliesTo.length===0){showToast('⚠️ Selecciona al menos un tipo de servicio');return;}
  const fmtDate=v=>v?new Date(v).toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'}):'—';
  if(_promoEditId!=null){
    const c=PROMO_CODES.find(x=>x.id===_promoEditId); if(!c) return;
    c.code=code; c.description=desc; c.type=_promoType; c.discountType=_promoDiscountType; c.value=value;
    c.maxUsesPerPerson=maxPerson?parseInt(maxPerson):null;
    c.maxUsesTotal=maxTotal?parseInt(maxTotal):null;
    c.launchDate=fmtDate(launch); c.caducidad=fmtDate(expiry);
    c.appliesTo=[..._promoAppliesTo]; c.audiencia=_promoAudiencia;
    closeModal(); rerender(); showToast(`Código ${code} actualizado ✓`);
  } else {
    if(PROMO_CODES.find(x=>x.code===code)){showToast('⚠️ Ya existe un código con ese nombre');return;}
    const newId=Math.max(...PROMO_CODES.map(c=>c.id))+1;
    PROMO_CODES.push({id:newId,code,type:_promoType,discountType:_promoDiscountType,value,uses:0,
      maxUsesPerPerson:maxPerson?parseInt(maxPerson):null,
      maxUsesTotal:maxTotal?parseInt(maxTotal):null,
      launchDate:fmtDate(launch),caducidad:fmtDate(expiry),status:'activo',description:desc,
      appliesTo:[..._promoAppliesTo],audiencia:_promoAudiencia});
    closeModal(); rerender(); showToast(`Código ${code} creado ✓`);
  }
}

function asignarPsicoDirecto(patId){

const PHONE_PREFIXES=[
  {c:'+34',l:'🇪🇸 +34'},{c:'+351',l:'🇵🇹 +351'},{c:'+33',l:'🇫🇷 +33'},
  {c:'+44',l:'🇬🇧 +44'},{c:'+49',l:'🇩🇪 +49'},{c:'+39',l:'🇮🇹 +39'},
  {c:'+32',l:'🇧🇪 +32'},{c:'+31',l:'🇳🇱 +31'},{c:'+41',l:'🇨🇭 +41'},
  {c:'+1', l:'🇺🇸 +1'},{c:'+52',l:'🇲🇽 +52'},{c:'+54',l:'🇦🇷 +54'},
  {c:'+57',l:'🇨🇴 +57'},{c:'+56',l:'🇨🇱 +56'},
];
function parsePhone(v=''){
  const s=v.toString().replace(/[\s\-]/g,'');
  for(const p of PHONE_PREFIXES){ if(s.startsWith(p.c)) return {pre:p.c,num:s.slice(p.c.length)}; }
  for(const p of PHONE_PREFIXES){ const c=p.c.replace('+',''); if(s.startsWith(c)) return {pre:p.c,num:s.slice(c.length)}; }
  return {pre:'+34',num:s.replace(/^\+/,'')};
}
function phoneInputHTML(id,val=''){
  const {pre,num}=parsePhone(val);
  const opts=PHONE_PREFIXES.map(p=>`<option value="${p.c}"${p.c===pre?' selected':''}>${p.l}</option>`).join('');
  return `<div style="display:flex;gap:6px"><select id="${id}-prefix" style="height:36px;border:1.5px solid #e5e7eb;border-radius:7px;background:#fff;font-size:12px;padding:0 6px;color:#111827;cursor:pointer">${opts}</select><input type="tel" id="${id}-num" class="field-input" style="flex:1;min-width:0" placeholder="600 000 000" value="${num}"/></div>`;
}
function getPhone(id){
  const pre=document.getElementById(id+'-prefix'), num=document.getElementById(id+'-num');
  if(!pre||!num){const el=document.getElementById(id);return el?el.value:'';}
  const n=num.value.replace(/\s/g,''); return n?pre.value+n:'';
}
function toDateInput(v=''){
  if(!v)return '';
  if(/^\d{4}-\d{2}-\d{2}$/.test(v))return v;
  const m=v.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  return m?`${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`:'';
}

function showToast(msg, duration=3200){
  let c=document.getElementById('toast-container');
  if(!c){c=document.createElement('div');c.id='toast-container';document.body.appendChild(c);}
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  c.appendChild(t);setTimeout(()=>t.remove(),duration);
}
function getGreeting(){
  const h=new Date().getHours();
  return h<14?'Buenos días':h<20?'Buenas tardes':'Buenas noches';
}

// ── SVG chart helpers ──────────────────────────────────────────────
function svgLineChart({data, labels, color='#20dc95', fill=true, w=540, h=160, yLabel='', prefix='', suffix=''}){
  const pad={t:16,r:16,b:28,l:50};
  const cw=w-pad.l-pad.r, ch=h-pad.t-pad.b;
  const max=Math.max(...data)*1.15||1, min=0;
  const xs=data.map((_,i)=>pad.l+i*(cw/(data.length-1)));
  const ys=data.map(v=>pad.t+ch-(v-min)/(max-min)*ch);
  const pts=xs.map((x,i)=>`${x},${ys[i]}`).join(' ');
  const fillPts=`${pad.l},${pad.t+ch} ${pts} ${xs[xs.length-1]},${pad.t+ch}`;
  // y-axis ticks
  const ticks=4;
  const yTicks=Array.from({length:ticks+1},(_,i)=>({v:Math.round(min+(max-min)*i/ticks),y:pad.t+ch-ch*i/ticks}));
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="overflow:visible">
    ${yTicks.map(t=>`
      <line x1="${pad.l}" y1="${t.y}" x2="${pad.l+cw}" y2="${t.y}" stroke="#f3f4f6" stroke-width="1"/>
      <text x="${pad.l-6}" y="${t.y+4}" text-anchor="end" font-size="9" fill="#9ca3af">${prefix}${t.v}${suffix}</text>`).join('')}
    ${labels.map((l,i)=>`<text x="${xs[i]}" y="${h-4}" text-anchor="middle" font-size="9" fill="#9ca3af">${l}</text>`).join('')}
    ${fill?`<polygon points="${fillPts}" fill="${color}" opacity=".1"/>`:''}
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${xs.map((x,i)=>`<circle cx="${x}" cy="${ys[i]}" r="3.5" fill="#fff" stroke="${color}" stroke-width="2"/>
      <title>${labels[i]}: ${prefix}${data[i]}${suffix}</title>`).join('')}
  </svg>`;
}

function svgBarChart({dataA, dataB, labels, colorA='#20dc95', colorB='#e5e7eb', labelA='', labelB='', w=540, h=160, suffix=''}){
  const pad={t:16,r:16,b:28,l:50};
  const cw=w-pad.l-pad.r, ch=h-pad.t-pad.b;
  const max=Math.max(...dataA,...dataB)*1.15||1;
  const n=labels.length, grpW=cw/n, barW=grpW*0.32, gap=grpW*0.06;
  const ticks=4;
  const yTicks=Array.from({length:ticks+1},(_,i)=>({v:Math.round(max*i/ticks),y:pad.t+ch-ch*i/ticks}));
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="overflow:visible">
    ${yTicks.map(t=>`
      <line x1="${pad.l}" y1="${t.y}" x2="${pad.l+cw}" y2="${t.y}" stroke="#f3f4f6" stroke-width="1"/>
      <text x="${pad.l-6}" y="${t.y+4}" text-anchor="end" font-size="9" fill="#9ca3af">${t.v}${suffix}</text>`).join('')}
    ${labels.map((l,i)=>{
      const x=pad.l+i*grpW+grpW/2;
      const hA=dataA[i]/max*ch, hB=dataB[i]/max*ch;
      return `
        <rect x="${x-barW-gap}" y="${pad.t+ch-hA}" width="${barW}" height="${hA}" fill="${colorA}" rx="3"/>
        <rect x="${x+gap}" y="${pad.t+ch-hB}" width="${barW}" height="${hB}" fill="${colorB}" rx="3"/>
        <text x="${x}" y="${h-4}" text-anchor="middle" font-size="9" fill="#9ca3af">${l}</text>`;
    }).join('')}
    <rect x="${pad.l}" y="4" width="10" height="10" fill="${colorA}" rx="2"/>
    <text x="${pad.l+14}" y="13" font-size="9" fill="#6b7280">${labelA}</text>
    <rect x="${pad.l+80}" y="4" width="10" height="10" fill="${colorB}" rx="2"/>
    <text x="${pad.l+94}" y="13" font-size="9" fill="#6b7280">${labelB}</text>
  </svg>`;
}

function svgStackedBar({data, labels, colors, names, w=540, h=160, suffix=''}){
  const pad={t:24,r:16,b:28,l:50};
  const cw=w-pad.l-pad.r, ch=h-pad.t-pad.b;
  const totals=labels.map((_,i)=>data.reduce((s,d)=>s+d[i],0));
  const max=Math.max(...totals)*1.15||1;
  const barW=cw/labels.length*0.55;
  const ticks=4;
  const yTicks=Array.from({length:ticks+1},(_,i)=>({v:Math.round(max*i/ticks),y:pad.t+ch-ch*i/ticks}));
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="overflow:visible">
    ${yTicks.map(t=>`
      <line x1="${pad.l}" y1="${t.y}" x2="${pad.l+cw}" y2="${t.y}" stroke="#f3f4f6" stroke-width="1"/>
      <text x="${pad.l-6}" y="${t.y+4}" text-anchor="end" font-size="9" fill="#9ca3af">${t.v}${suffix}</text>`).join('')}
    ${labels.map((l,i)=>{
      const x=pad.l+(i+0.5)*(cw/labels.length);
      let yOff=pad.t+ch;
      const bars=data.map((d,di)=>{
        const bh=d[i]/max*ch;
        yOff-=bh;
        return `<rect x="${x-barW/2}" y="${yOff}" width="${barW}" height="${bh}" fill="${colors[di]}" rx="2"/>`;
      });
      return bars.join('')+`<text x="${x}" y="${h-4}" text-anchor="middle" font-size="9" fill="#9ca3af">${l}</text>`;
    }).join('')}
    ${names.map((n,i)=>`<rect x="${pad.l+i*90}" y="4" width="10" height="10" fill="${colors[i]}" rx="2"/>
      <text x="${pad.l+i*90+14}" y="13" font-size="9" fill="#6b7280">${n}</text>`).join('')}
  </svg>`;
}

function svgDonut({values, colors, labels, w=140, h=140}){
  const total=values.reduce((a,b)=>a+b,0)||1;
  const r=52, cx=w/2, cy=h/2, stroke=22;
  let angle=-Math.PI/2;
  const arcs=values.map((v,i)=>{
    const a=v/total*2*Math.PI;
    const x1=cx+r*Math.cos(angle), y1=cy+r*Math.sin(angle);
    angle+=a;
    const x2=cx+r*Math.cos(angle), y2=cy+r*Math.sin(angle);
    const large=a>Math.PI?1:0;
    return `<path d="M${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2}" fill="none" stroke="${colors[i]}" stroke-width="${stroke}" stroke-linecap="butt">
      <title>${labels[i]}: ${values[i]}</title>
    </path>`;
  });
  return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#f3f4f6" stroke-width="${stroke}"/>
    ${arcs.join('')}
    <text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="18" font-weight="800" fill="#111827">${total}</text>
    <text x="${cx}" y="${cy+16}" text-anchor="middle" font-size="8" fill="#9ca3af">total</text>
  </svg>`;
}

function kpiArrow(curr, prev, suffix=''){
  const diff=curr-prev, pct=prev?Math.round(diff/prev*100):0;
  const up=diff>=0;
  return `<span style="font-size:11px;font-weight:700;color:${up?'#065f46':'#b91c1c'};background:${up?'#f0fdf8':'#fef2f2'};border-radius:5px;padding:2px 7px;margin-left:6px">
    ${up?'↑':'↓'} ${Math.abs(pct)}%
  </span>`;
}

const TABS = {inicio:tabInicio,psicologas:tabPsicologas,pacientes:tabPacientes,empresas:tabEmpresas,facturacion:tabFacturacion,codigos:tabCodigos,precios:tabPrecios,estadisticas:tabEstadisticas,bbdd:tabBBDD,ajustes:tabAjustes};

function renderNav(){
  document.getElementById('nav').innerHTML = NAV_ITEMS.map(n=>{
    if(n.section) return `<div class="nav-section">${n.section}</div>`;
    const active = currentNav===n.id;
    return `<button class="nav-btn ${active?'active':''}" onclick="navigate('${n.id}')">
      <span class="nav-icon" style="opacity:${active?1:.7}">${_SVG[n.id]||''}</span>${n.label}
      ${n.badge?`<span class="nav-badge">${n.badge}</span>`:''}
      ${active?'<div class="nav-indicator"></div>':''}
    </button>`;
  }).join('');
}

function renderTab(){
  const el=document.getElementById('content');
  el.innerHTML=TABS[currentNav]?TABS[currentNav]():'';
  const TITLES={inicio:'Inicio',psicologas:'Psicólogas',pacientes:'Pacientes',empresas:'Empresas / B2B',facturacion:'Facturación global',codigos:'Códigos promocionales',precios:'Gestión de precios',estadisticas:'Estadísticas y Analítica',bbdd:'Base de datos',ajustes:'Ajustes'};
  document.getElementById('topbar-title').textContent=TITLES[currentNav]||'';
  document.getElementById('topbar-sub').textContent=`${new Date().toLocaleDateString('es',{day:'numeric',month:'long',year:'numeric'})}`;
}

function rerender(){ renderNav(); renderTab(); }
function navigate(id){
  currentNav=id;
  if(id==='inicio' && !_asig.loaded && !_asig.loading) loadPendingAssignments();

// ── ADMIN BILLING (Supabase) ──────────────────────────────────
let _adminInvoices = [], _adminInvLoading = false, _adminInvLoaded = false;

async function loadAdminInvoices(){
  _adminInvLoading=true; rerender();
  const {data} = await sbAdmin.from('invoices')
    .select('*, psychologists(nombre,apellidos,tarifa,irpf)')
    .eq('estado','confirmada')
    .order('created_at',{ascending:false});
  _adminInvoices = data||[];
  _adminInvLoading=false; _adminInvLoaded=true; rerender();
}

async function adminMarkPaid(invoiceId, psicoName){
  const fechaPago=new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'});
  const {error}=await sbAdmin.from('invoices').update({estado:'pagada',paid_at:new Date().toISOString(),fecha_pago:fechaPago}).eq('id',invoiceId);
  if(error) return showToast('Error: '+error.message,'error');
  showToast(`✓ ${psicoName} — factura marcada como pagada`,'success');
  _adminInvLoaded=false; await loadAdminInvoices();
}

// ── ASIGNACIONES (pacientes pagados sin psicóloga) ─────────────
let _asig = { loading:false, loaded:false, pending:[], psychs:[] };

async function loadPendingAssignments(){
  _asig.loading = true; rerender();
  const [pendRes, psyRes] = await Promise.all([
    sbAdmin.from('patients')
      .select('id, nombre, apellidos, email, phone, categoria, plan_elegido, motivos, disponibilidad, created_at')
      .eq('status','pagado_sin_asignar')
      .order('created_at',{ascending:false}),
    sbAdmin.from('psychologists')
      .select('id, nombre, apellidos, status')
      .eq('status','activo')
      .order('nombre'),
  ]);
  _asig.pending = pendRes.data || [];
  _asig.psychs  = psyRes.data  || [];
  _asig.loading = false; _asig.loaded = true;
  rerender();
}

async function assignPsychologistToPatient(patientId, psyId, patientName){
  if(!psyId){ showToast('Selecciona una psicóloga','error'); return; }
  const { error } = await sbAdmin.from('patients')
    .update({ psychologist_id: psyId, status: 'activo' })
    .eq('id', patientId);
  if(error){ showToast('Error: '+error.message,'error'); return; }
  showToast(`✓ ${patientName} asignada correctamente`,'success');
  _asig.loaded=false; await loadPendingAssignments();
}

async function doLogout(){
  localStorage.removeItem('pop_session');
  await sb.auth.signOut();
  window.location.href = 'login.html';
}
