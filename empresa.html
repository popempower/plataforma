@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;overflow:hidden;background:#fafafa;font-size:13px;color:#111827}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow-pulse{0%,100%{box-shadow:0 4px 14px rgba(32,220,149,.45)}50%{box-shadow:0 4px 28px rgba(32,220,149,.85),0 0 0 6px rgba(32,220,149,.15)}}
@keyframes dot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
@keyframes wa-bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.fadeUp{animation:fadeUp .22s ease}
button,input,textarea,select{font-family:inherit}
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:220px;background:#fff;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;padding:18px 12px;flex-shrink:0}
#content{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#fafafa}
#topbar{height:50px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0}
#tabcontent{flex:1;overflow:hidden;display:flex;flex-direction:column}
.logo{display:flex;align-items:center;gap:8px;padding:4px 8px;margin-bottom:20px}
.logo-icon{width:28px;height:28px;background:#20dc95;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:11px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;border:none;cursor:pointer;text-align:left;font-size:13px;width:100%;position:relative;transition:background .12s}
.nav-btn.active{background:#f0fdf8;color:#065f46;font-weight:600}
.nav-btn:not(.active){background:transparent;color:#6b7280;font-weight:400}
.nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.nav-indicator{position:absolute;right:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:#20dc95;border-radius:2px}
.sidebar-user{border-top:1px solid #e5e7eb;padding-top:12px;display:flex;align-items:center;gap:9px}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px 20px}
.badge{border-radius:999px;padding:2px 9px;font-size:11px;font-weight:600;border:1px solid;display:inline-block}
.badge.green{background:#f0fdf8;color:#065f46;border-color:#d1fae5}
.badge.gray{background:#f3f4f6;color:#6b7280;border-color:#e5e7eb}
.badge.blue{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}
.badge.amber{background:#fffbeb;color:#92400e;border-color:#fde68a}
.badge.purple{background:#faf5ff;color:#6b21a8;border-color:#e9d5ff}
.btn-green{background:#20dc95;color:#065f46;border:none;border-radius:9px;padding:10px 22px;font-weight:700;font-size:13px;cursor:pointer;transition:opacity .15s}
.btn-green:hover{opacity:.9}
.btn-gray{background:#fafafa;color:#374151;border:1px solid #e5e7eb;border-radius:9px;padding:8px 16px;font-weight:600;font-size:12px;cursor:pointer}
.field-label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px}
.field-input{width:100%;padding:10px 13px;border-radius:8px;border:1.5px solid #e5e7eb;font-size:13px;outline:none;color:#111827;transition:border-color .15s}
.field-input:focus{border-color:#20dc95}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.modal-box{background:#fff;border-radius:16px;max-height:88vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);animation:fadeUp .2s ease}
.chat-bubble{max-width:420px;padding:9px 14px;font-size:13px;line-height:1.55;word-break:break-word}
.chat-bubble.mine{background:#f0fdf8;border:1px solid #d1fae5;border-radius:14px 14px 2px 14px;align-self:flex-end}
.chat-bubble.theirs{background:#f3f4f6;border-radius:14px 14px 14px 2px}
.cal-mini-cell{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px;font-size:11px;font-weight:500;position:relative;cursor:default}
.cal-mini-cell.today{background:#20dc95;color:#fff;font-weight:800}
.cal-mini-cell.has-session{background:#eff6ff;color:#1d4ed8;font-weight:700;cursor:pointer}
.cal-mini-cell.has-session.done{background:#f0fdf8;color:#065f46}
.cal-mini-cell.other{color:#d1d5db}
/* WhatsApp flotante */
#wa-btn{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:#25d366;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(37,211,102,.5);z-index:100;animation:wa-bounce 3s ease-in-out infinite;text-decoration:none;border:none}
/* Mobile nav */
#mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:62px;background:#fff;border-top:1px solid #e5e7eb;z-index:120;align-items:stretch}
.m-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;cursor:pointer;font-size:9px;font-weight:600;color:#9ca3af;padding:4px 0;font-family:inherit;transition:color .15s}
.m-nav-btn.active{color:#20dc95}
.m-nav-icon{font-size:18px;line-height:1}
.mas-item{width:100%;padding:14px 16px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;font-size:14px;font-weight:600;color:#374151;cursor:pointer;font-family:inherit;text-align:left;display:flex;align-items:center;gap:10px}
.mas-item:active{background:#f0fdf8;border-color:#20dc95}

@media(max-width:768px){
  html{overflow-x:hidden!important;height:auto!important}
  body{overflow-x:hidden!important;overflow-y:auto!important;height:auto!important}
  #app{height:auto!important;min-height:100vh;flex-direction:column!important;overflow:visible!important}
  #sidebar{display:none!important}
  #content{height:auto!important;overflow:visible!important;overflow-x:hidden!important;flex:none!important;min-height:calc(100vh - 50px)}
  #topbar{padding:0 14px;gap:6px;height:50px}
  #topbar > div:nth-child(2),#topbar > div:nth-child(3),#topbar > button:not(#mobile-logout){display:none!important}
  #mobile-logout{display:flex!important}
  #tabcontent{display:block!important;overflow:visible!important;overflow-x:hidden!important;height:auto!important;flex:none!important;padding-bottom:76px!important}
  #tabcontent > div{display:block!important;height:auto!important;min-height:0!important;overflow:visible!important;flex:none!important;padding:16px!important}
  #mobile-nav{display:flex!important}

  /* Grids → columna única */
  [style*="grid-template-columns:1fr 280px"]{grid-template-columns:1fr!important}
  [style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr!important}
  [style*="grid-template-columns:1fr 1fr 1fr"]{grid-template-columns:1fr!important}
  [style*="grid-template-columns:repeat(3"]{grid-template-columns:1fr 1fr!important}
  [style*="max-width:560px"],[style*="max-width:500px"]{max-width:100%!important}

  /* Overflow horizontal */
  #tabcontent [style*="display:flex"] > *{min-width:0}
  #tabcontent [style*="display:grid"] > *{min-width:0}

  /* Chat: layout de columna con área de mensajes de altura fija */
  #tabcontent [style*="flex:1;display:flex;flex-direction:column;overflow:hidden"]{padding:0!important}
  #chat-msgs{height:360px!important;flex:none!important}

  /* Encuestas: iframe container con altura fija */
  #tabcontent [style*="flex:1;overflow:hidden"]{height:480px!important;flex:none!important;overflow:hidden!important}

  /* WhatsApp por encima del nav */
  a#wa-btn{bottom:76px!important}

  /* Modales */
  .modal-overlay{align-items:flex-end!important;padding-bottom:0}
  .modal-box{width:calc(100vw - 24px)!important;max-width:none!important;border-radius:20px 20px 0 0!important;max-height:90vh!important}
  .tour-card{width:calc(100vw - 32px)!important}

  /* Chat bubble */
  .chat-bubble{max-width:82vw!important}

/* Tour overlay */
.tour-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.tour-card{background:#fff;border-radius:16px;padding:28px;width:400px;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:fadeUp .25s ease;position:relative}
.tour-step-dot{width:8px;height:8px;border-radius:50%;background:#e5e7eb;transition:background .2s}
.tour-step-dot.active{background:#20dc95}

// ── MINI CALENDAR ─────────────────────────────────────────────
function miniCalendar(){
  const dias = ['L','M','X','J','V','S','D'];
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const firstDay = new Date(calYear,calMonth,1).getDay();
  const offset = firstDay===0?6:firstDay-1;
  const daysInMonth = new Date(calYear,calMonth+1,0).getDate();
  const daysInPrev = new Date(calYear,calMonth,0).getDate();
  const today = new Date();
  const sesEnFecha = (d) => SESIONES.find(s=>{const p=s.fecha.split('-');return parseInt(p[0])===calYear&&parseInt(p[1])-1===calMonth&&parseInt(p[2])===d;});
  const cells=[];
  for(let i=0;i<offset;i++) cells.push({day:daysInPrev-offset+1+i,other:true});
  for(let d=1;d<=daysInMonth;d++){
    const isToday=today.getFullYear()===calYear&&today.getMonth()===calMonth&&today.getDate()===d;
    cells.push({day:d,today:isToday,ses:sesEnFecha(d)});
  }
  while(cells.length%7!==0) cells.push({day:cells.length-daysInMonth-offset+1,other:true});

  return `<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="font-weight:700;font-size:12px">${meses[calMonth]} ${calYear}</div>
      <div style="display:flex;gap:4px">
        <button onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}rerender()" style="background:none;border:1px solid #e5e7eb;border-radius:5px;width:22px;height:22px;cursor:pointer;font-size:11px;color:#6b7280">‹</button>
        <button onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}rerender()" style="background:none;border:1px solid #e5e7eb;border-radius:5px;width:22px;height:22px;cursor:pointer;font-size:11px;color:#6b7280">›</button>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">
      ${dias.map(d=>`<div style="text-align:center;font-size:9px;font-weight:700;color:#9ca3af;padding:2px">${d}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">
      ${cells.map(c=>{
        if(c.other) return `<div class="cal-mini-cell other">${c.day}</div>`;
        if(c.today) return `<div class="cal-mini-cell today">${c.day}</div>`;
        if(c.ses){
          const done=c.ses.estado==='realizada';
          return `<div class="cal-mini-cell has-session ${done?'done':''}" title="${c.ses.hora} · ${done?'Realizada':'Programada'}">${c.day}<div style="position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:${done?'#20dc95':'#3b82f6'}"></div></div>`;
        }
        return `<div class="cal-mini-cell">${c.day}</div>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;padding-top:8px;border-top:1px solid #f3f4f6">
      <div style="display:flex;align-items:center;gap:4px"><div style="width:6px;height:6px;border-radius:50%;background:#20dc95"></div><span style="font-size:10px;color:#9ca3af">Realizada</span></div>
      <div style="display:flex;align-items:center;gap:4px"><div style="width:6px;height:6px;border-radius:50%;background:#3b82f6"></div><span style="font-size:10px;color:#9ca3af">Programada</span></div>
    </div>
  </div>`;
}

function entrarSala(){

  document.getElementById('modal-root').innerHTML=`
  <div style="position:fixed;inset:0;background:#0d1117;z-index:500;display:flex;flex-direction:column;overflow:hidden">
    <div style="display:flex;justify-content:flex-end;padding:12px 16px;flex-shrink:0">
      <button onclick="document.getElementById('modal-root').innerHTML=''" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;font-size:13px;padding:6px 16px;cursor:pointer;font-family:inherit">← Volver</button>
    </div>
    <iframe id="b2b-video-frame" src="${saved?saved+'&lang=es':''}" allow="camera;microphone;fullscreen;speaker;display-capture;autoplay" style="flex:1;border:none;display:${saved?'block':'none'}"></iframe>
    ${!saved?`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:#fff;padding:24px">
      <div style="font-size:40px">🎥</div>
      <div style="font-weight:700;font-size:18px">Unirse a la sesión</div>
      <div style="font-size:13px;color:rgba(255,255,255,.5);text-align:center;max-width:320px">Tu psicóloga te enviará el enlace de la sesión por chat. Pégalo aquí para conectarte.</div>
      <div style="display:flex;gap:8px;width:100%;max-width:420px">
        <input id="b2b-room-input" placeholder="Pega el enlace de la sesión..." style="flex:1;padding:10px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-size:13px;font-family:inherit"/>
        <button onclick="b2bJoinRoom()" style="background:#20dc95;color:#065f46;border:none;border-radius:8px;padding:10px 20px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap">Entrar</button>
      </div>
    </div>`:''}
  </div>`;
}

function b2bJoinRoom(){
  const url=(document.getElementById('b2b-room-input')?.value||'').trim();
  if(!url){alert('Pega el enlace que te envió tu psicóloga');return;}
  localStorage.setItem('whereby_guest_url',url);
  const frame=document.getElementById('b2b-video-frame');
  if(frame){frame.src=url+'&lang=es';frame.style.display='block';}
  const form=document.querySelector('#modal-root > div > div:last-child');
  if(form) form.remove();
}

  const area=EXERCISES[ejercArea];
  const items=area.items.map(ex=>{

    let embed='';
    if(open){
      if(ex.type==='genially') embed=`<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden"><iframe src="${ex.src}" frameborder="0" allowfullscreen style="position:absolute;top:0;left:0;width:100%;height:100%"></iframe></div>`;

    <div id="chat-msgs" style="flex:1;overflow:auto;padding:18px 22px;display:flex;flex-direction:column;gap:12px">
      ${MENSAJES.map(m=>`
        <div style="display:flex;flex-direction:column;align-items:${m.de==='yo'?'flex-end':'flex-start'};gap:3px">
          <div class="chat-bubble ${m.de==='yo'?'mine':'theirs'}">${m.texto}</div>

    <div style="padding:12px 22px;background:#fff;border-top:1px solid #e5e7eb;display:flex;gap:10px">
      <input class="field-input" id="chatInput" placeholder="Escribe un mensaje..." style="flex:1" onkeydown="if(event.key==='Enter')sendMsg()"/>

function sendMsg(){
  const inp=document.getElementById('chatInput');
  const txt=inp.value.trim(); if(!txt) return;
  MENSAJES.push({de:'yo',texto:txt,hora:'Ahora'});
  inp.value=''; rerender();
  setTimeout(()=>{ const el=document.getElementById('chat-msgs'); if(el) el.scrollTop=el.scrollHeight; },50);
}

let tourStep = 0;

function startTour(){ tourStep=0; showTourStep(); }

function showTourStep(){
  const step=TOUR_STEPS[tourStep];
  if(step.nav) navigate(step.nav);
  const total=TOUR_STEPS.length;
  document.getElementById('modal-root').innerHTML=`
  <div class="tour-overlay" onclick="if(event.target.classList.contains('tour-overlay'))closeTour()">
    <div class="tour-card">
      <div style="text-align:center;margin-bottom:16px">
        <div style="font-size:40px;margin-bottom:10px">${step.icon}</div>
        <div style="font-weight:800;font-size:17px;margin-bottom:8px">${step.title}</div>
        <p style="font-size:13px;color:#6b7280;line-height:1.6">${step.text}</p>
      </div>
      <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:20px">
        ${TOUR_STEPS.map((_,i)=>`<div class="tour-step-dot ${i===tourStep?'active':''}"></div>`).join('')}
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="closeTour()" class="btn-gray" style="flex:1">Saltar tour</button>
        ${tourStep>0?`<button onclick="tourStep--;showTourStep()" class="btn-gray" style="flex:0 0 auto">← Atrás</button>`:''}
        <button onclick="${tourStep<total-1?'tourStep++;showTourStep()':'closeTour()'}" class="btn-green" style="flex:1;animation:none">
          ${tourStep<total-1?'Siguiente →':'¡Entendido!'}
        </button>
      </div>
    </div>
  </div>`;
}
